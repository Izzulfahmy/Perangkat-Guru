<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Admin - Perangkat Guru</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .register-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        .note {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Registrasi Akun Admin</h2>
        <p style="font-size: 14px; color: #d9534f;">Sistem mendeteksi belum ada Admin utama. Silakan buat akun Admin terlebih dahulu.</p>
        
        <form id="register-form">
            <div class="form-group">
                <label for="reg-username">Username Admin</label>
                <input type="text" id="reg-username" placeholder="Contoh: admin" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Minimal 6 karakter" required>
            </div>
            <button type="submit">Daftarkan Admin</button>
        </form>
        <div class="note">Setelah mendaftar, Anda akan dialihkan ke halaman utama.</div>
    </div>

    <script type="module">
        // Perbaikan: Menggunakan URL CDN resmi untuk HTML statis
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Konfigurasi Firebase Anda yang sudah valid
        const firebaseConfig = {
          apiKey: "AIzaSyBrvRy59biZZilEgp8HIpHIUA16PcaflJU",
          authDomain: "perangkat-guru-85e8f.firebaseapp.com",
          projectId: "perangkat-guru-85e8f",
          storageBucket: "perangkat-guru-85e8f.firebasestorage.app",
          messagingSenderId: "489186826165",
          appId: "1:489186826165:web:c7b6d6a91ec70d12f06bfc",
          measurementId: "G-6K1DGGKEES"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function convertToEmail(username) {
            if (!username.includes('@')) {
                return `${username}@perangkatguru.local`; 
            }
            return username;
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const fakeEmail = convertToEmail(username);

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    username: username,
                    email: fakeEmail,
                    role: "admin",
                    createdAt: new Date()
                });

                alert("Registrasi Admin berhasil!");
                window.location.href = "index.html";

            } catch (error) {
                console.error(error);
                alert("Registrasi gagal: " + error.message);
            }
        });
    </script>
</body>
</html>
