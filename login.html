<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Perangkat Guru</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .login-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">Memeriksa sistem...</div>

    <div class="login-container">
        <h2>Login Perangkat Guru</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" placeholder="Masukkan username" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Masukkan password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>

    <script type="module">
        // Perbaikan: Menggunakan URL CDN resmi untuk HTML statis
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Konfigurasi Firebase Anda yang sudah valid
        const firebaseConfig = {
          apiKey: "AIzaSyBrvRy59biZZilEgp8HIpHIUA16PcaflJU",
          authDomain: "perangkat-guru-85e8f.firebaseapp.com",
          projectId: "perangkat-guru-85e8f",
          storageBucket: "perangkat-guru-85e8f.firebasestorage.app",
          messagingSenderId: "489186826165",
          appId: "1:489186826165:web:c7b6d6a91ec70d12f06bfc",
          measurementId: "G-6K1DGGKEES"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function checkAdminExists() {
            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("role", "==", "admin"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    window.location.href = "register.html";
                } else {
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (error) {
                console.error("Gagal memeriksa database:", error);
                document.getElementById('loading').innerText = "Gagal memuat sistem. Periksa Firestore Rules Anda.";
            }
        }

        window.addEventListener('DOMContentLoaded', checkAdminExists);

        function convertToEmail(username) {
            if (!username.includes('@')) {
                return `${username}@perangkatguru.local`; 
            }
            return username;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => { 
            e.preventDefault(); 
            const username = document.getElementById('login-username').value; 
            const password = document.getElementById('login-password').value; 
            const fakeEmail = convertToEmail(username); 
            
            try { 
                await signInWithEmailAndPassword(auth, fakeEmail, password); 
                window.location.href = "index.html"; 
            } catch (error) { 
                console.error(error); 
                alert("Login gagal: Username atau password salah."); 
            } 
        });
    </script>
</body>
</html>
