<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modul Ajar - Perangkat Guru</title>
  
  <link rel="icon" type="image/png" href="./asset/logo.png" />
  <link rel="shortcut icon" type="image/png" href="./asset/logo.png" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin="anonymous"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .swal2-minimalist-popup {
      border-radius: 32px !important;
      padding: 1.5rem !important;
      background: rgba(255, 255, 255, 0.98) !important;
      backdrop-filter: blur(10px) !important;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15) !important;
      border: 1px solid #f1f5f9 !important;
    }

    .splash-fade-out {
      opacity: 0 !important;
      transform: scale(1.08) !important;
      transition: opacity 0.6s ease-out, transform 0.6s ease-out !important;
      pointer-events: none !important;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrvRy59biZZilEgp8HIpHIUA16PcaflJU",
      authDomain: "perangkat-guru-85e8f.firebaseapp.com",
      projectId: "perangkat-guru-85e8f",
      storageBucket: "perangkat-guru-85e8f.firebasestorage.app",
      messagingSenderId: "489186826165",
      appId: "1:489186826165:web:c7b6d6a91ec70d12f06bfc",
      measurementId: "G-6K1DGGKEES"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.auth = getAuth(app);
    
    window.fs = { 
      collection, getDocs, setDoc, doc, deleteDoc, updateDoc,
      signInAnonymously 
    };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased text-sm min-h-screen">

  <div id="app-splash-screen" class="fixed inset-0 bg-gradient-to-br from-blue-600 to-blue-700 z-[9999] flex flex-col items-center justify-center text-white p-4 transition-all duration-700">
    <div id="splash-content" class="flex flex-col items-center max-w-md text-center space-y-5">
      <img src="./asset/logo.png" alt="Logo UNEJ" class="w-24 h-auto drop-shadow-xl animate-pulse" onerror="this.style.display='none'">
      <div class="space-y-1">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight">Modul Ajar</h1>
        <p class="text-xs md:text-sm text-blue-100 font-medium opacity-90">Sistem Perencanaan Pembelajaran Integratif</p>
      </div>
      <div class="pt-4">
        <div class="w-10 h-10 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
      </div>
    </div>
  </div>

  <div id="root" class="min-h-screen w-full"></div>
  
  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useMemo, useRef } = React;

    const TAB_LIST = [
      { id: 'info-umum', title: 'Informasi Umum', icon: 'fa-circle-info' },
      { id: 'identifikasi-murid', title: 'Identifikasi Murid', icon: 'fa-users-viewfinder' },
      { id: 'materi-pelajaran', title: 'Materi Pelajaran', icon: 'fa-book-open-reader' },
      { id: 'profil-pancasila', title: 'Dimensi Profil Pelajar Pancasila', icon: 'fa-award' },
      { id: 'desain-pembelajaran', title: 'Desain Pembelajaran', icon: 'fa-compass-drafting' },
      { id: 'kerangka-pembelajaran', title: 'Kerangka Pembelajaran', icon: 'fa-sitemap' },
      { id: 'pengalaman-belajar', title: 'Pengalaman Belajar', icon: 'fa-chalkboard-user' },
      { id: 'asesmen', title: 'Asesmen', icon: 'fa-list-check' },
      { id: 'pengayaan-remedial', title: 'Pengayaan dan Remedial', icon: 'fa-chart-line' },
      { id: 'refleksi-diri', title: 'Refleksi Diri', icon: 'fa-user-pen' }
    ];

    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [user, setUser] = useState(() => {
        try {
          const savedUser = localStorage.getItem('presensi_user');
          return savedUser ? JSON.parse(savedUser) : null; 
        } catch(e) { return null; }
      });

      const [rombelsDb, setRombelsDb] = useState([]);
      const [subjectsDb, setSubjectsDb] = useState([]);
      const [academicYearsDb, setAcademicYearsDb] = useState([]);
      const [settingsDb, setSettingsDb] = useState({});
      
      const [babsDb, setBabsDb] = useState([]);
      const [materisDb, setMaterisDb] = useState([]);

      const [selectedRombel, setSelectedRombel] = useState(null);
      const [selectedSubject, setSelectedSubject] = useState(null);
      const [selectedBab, setSelectedBab] = useState(null);
      const [selectedMateri, setSelectedMateri] = useState(null);

      const [activeTab, setActiveTab] = useState(0);

      // State Tunggal untuk seluruh data Modul Ajar
      const [modulData, setModulData] = useState({
        infoUmum: {
          judul: 'RENCANA PEMBELAJARAN MENDALAM (RPM)',
          namaPenyusun: '',
          satuanPendidikan: '',
          tahunAjaran: '',
          mataPelajaran: '',
          jenjangKelas: '',
          fase: 'Fase A',
          babTopik: '',
          alokasiWaktu: '2 JP (2 x 35 menit)'
        },
        identifikasiMurid: {
          pengetahuanAwal: '',
          minat: '',
          kebutuhanBelajar: ''
        },
        materiPelajaran: {
          deskripsi: '',
          poinMateri: ['']
        }
      });

      const [saveStatus, setSaveStatus] = useState('Tersimpan');
      const isInitialMount = useRef(true);

      const activeAcademicPeriod = useMemo(() => {
        return academicYearsDb.find(ay => ay.isActive) || null;
      }, [academicYearsDb]);

      const teacherRombels = useMemo(() => {
        if (!user || !activeAcademicPeriod) return [];
        const userName = user.name.trim().toLowerCase();
        
        return rombelsDb.filter(rb => {
          if (rb.academicYearId !== activeAcademicPeriod.id) return false;
          const isWali = rb.homeroomTeacher && rb.homeroomTeacher.trim().toLowerCase() === userName;
          
          let isSubjectTeacher = false;
          if (rb.subjectAssignments) {
            Object.values(rb.subjectAssignments).forEach(teacher => {
              if (teacher && teacher.trim().toLowerCase() === userName) {
                isSubjectTeacher = true;
              }
            });
          }
          return isWali || isSubjectTeacher;
        });
      }, [user, rombelsDb, activeAcademicPeriod]);

      const teacherSubjectsForSelectedRombel = useMemo(() => {
        if (!selectedRombel || !user || !activeAcademicPeriod) return [];
        const userName = user.name.trim().toLowerCase();
        const list = [];

        if (selectedRombel.subjectAssignments) {
          Object.keys(selectedRombel.subjectAssignments).forEach(subjId => {
            const assignedTeacher = selectedRombel.subjectAssignments[subjId];
            if (assignedTeacher && assignedTeacher.trim().toLowerCase() === userName) {
              const matchedSubj = subjectsDb.find(s => s.id.toString() === subjId.toString() && s.academicYearId === activeAcademicPeriod.id);
              if (matchedSubj) {
                list.push(matchedSubj);
              }
            }
          });
        }
        return list;
      }, [selectedRombel, user, subjectsDb, activeAcademicPeriod]);

      const filteredBabs = useMemo(() => {
        if (!selectedRombel || !selectedSubject || !activeAcademicPeriod) return [];
        return babsDb.filter(b => 
          b.rombelId === selectedRombel.id && 
          b.subjectId === selectedSubject.id &&
          b.academicYearId === activeAcademicPeriod.id
        ).sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
      }, [babsDb, selectedRombel, selectedSubject, activeAcademicPeriod]);

      const filteredMateris = useMemo(() => {
        if (!selectedBab) return [];
        return materisDb.filter(m => m.babId === selectedBab.id).sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
      }, [materisDb, selectedBab]);

      useEffect(() => {
        const loadSystemData = async () => {
          try {
            await window.fs.signInAnonymously(window.auth);
            
            const [rombSnap, subjSnap, academicSnap, setSnap, babsSnap, materisSnap] = await Promise.all([
              window.fs.getDocs(window.fs.collection(window.db, "rombels")),
              window.fs.getDocs(window.fs.collection(window.db, "subjects")),
              window.fs.getDocs(window.fs.collection(window.db, "academic_years")),
              window.fs.getDocs(window.fs.collection(window.db, "settings")),
              window.fs.getDocs(window.fs.collection(window.db, "modul_babs")),
              window.fs.getDocs(window.fs.collection(window.db, "modul_materis"))
            ]);

            setRombelsDb(rombSnap.docs.map(d => d.data()));
            setSubjectsDb(subjSnap.docs.map(d => d.data()));
            setAcademicYearsDb(academicSnap.docs.map(d => d.data()));
            setBabsDb(babsSnap.docs.map(d => d.data()));
            setMaterisDb(materisSnap.docs.map(d => d.data()));

            let s = {};
            setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });
            setSettingsDb(s);

            const splashDOM = document.getElementById('app-splash-screen');
            if (splashDOM) {
              splashDOM.classList.add('splash-fade-out');
              setTimeout(() => splashDOM.remove(), 600);
            }
            setIsLoading(false);
          } catch (e) {
            console.error(e);
            Swal.fire('Koneksi Gagal', 'Gagal memuat data sistem Firestore.', 'error');
            setIsLoading(false);
          }
        };

        const checkFirebase = () => {
          if (window.db && window.fs) loadSystemData();
          else window.addEventListener('firebase-ready', loadSystemData, {once: true});
        };
        checkFirebase();
      }, []);

      // LOAD DATA MODUL AJAR SATU DOKUMEN UTUH DARI FIRESTORE (`modul_data`)
      useEffect(() => {
        if (!selectedMateri) return;
        
        isInitialMount.current = true;
        const loadModulData = async () => {
          try {
            const snap = await window.fs.getDocs(window.fs.collection(window.db, "modul_data"));
            const existingModul = snap.docs.find(d => d.id === selectedMateri.id.toString())?.data();

            const loadedInfoUmum = {
              judul: existingModul?.infoUmum?.judul || 'RENCANA PEMBELAJARAN MENDALAM (RPM)',
              namaPenyusun: user ? user.name : '',
              satuanPendidikan: settingsDb.namaInstansi || '',
              tahunAjaran: activeAcademicPeriod ? `${activeAcademicPeriod.year} (${activeAcademicPeriod.semester})` : '',
              mataPelajaran: selectedSubject ? selectedSubject.name : '',
              jenjangKelas: selectedRombel ? `${selectedRombel.level} - ${selectedRombel.name}` : '',
              fase: existingModul?.infoUmum?.fase || 'Fase A',
              babTopik: `${selectedBab ? selectedBab.title : ''} / ${selectedMateri ? selectedMateri.title : ''}`,
              alokasiWaktu: existingModul?.infoUmum?.alokasiWaktu || '2 JP (2 x 35 menit)'
            };

            const loadedIdentifikasi = {
              pengetahuanAwal: existingModul?.identifikasiMurid?.pengetahuanAwal || '',
              minat: existingModul?.identifikasiMurid?.minat || '',
              kebutuhanBelajar: existingModul?.identifikasiMurid?.kebutuhanBelajar || ''
            };

            const loadedMateriPelajaran = {
              deskripsi: existingModul?.materiPelajaran?.deskripsi || '',
              poinMateri: existingModul?.materiPelajaran?.poinMateri && existingModul.materiPelajaran.poinMateri.length > 0
                ? existingModul.materiPelajaran.poinMateri
                : ['']
            };

            setModulData({
              ...existingModul,
              infoUmum: loadedInfoUmum,
              identifikasiMurid: loadedIdentifikasi,
              materiPelajaran: loadedMateriPelajaran
            });

            setSaveStatus('Tersimpan');
            setTimeout(() => { isInitialMount.current = false; }, 300);
          } catch(e) {
            console.error("Gagal memuat detail modul: ", e);
            isInitialMount.current = false;
          }
        };

        loadModulData();
      }, [selectedMateri, selectedRombel, selectedSubject, selectedBab, activeAcademicPeriod, user, settingsDb]);

      // AUTO-SAVE DEBOUNCED KE DOKUMEN UNIK `modul_data/{materiId}`
      useEffect(() => {
        if (!selectedMateri || isInitialMount.current) return;

        setSaveStatus('Menyimpan...');
        const timer = setTimeout(async () => {
          try {
            const payload = {
              materiId: selectedMateri.id,
              babId: selectedBab.id,
              subjectId: selectedSubject.id,
              rombelId: selectedRombel.id,
              academicYearId: activeAcademicPeriod?.id || null,
              ...modulData,
              updatedAt: Date.now()
            };

            await window.fs.setDoc(window.fs.doc(window.db, "modul_data", selectedMateri.id.toString()), payload, { merge: true });
            setSaveStatus('Tersimpan');
          } catch(err) {
            console.error(err);
            setSaveStatus('Gagal Menyimpan');
          }
        }, 1000);

        return () => clearTimeout(timer);
      }, [modulData]);

      // HELPER UPDATER PER SECTION
      const updateInfoUmum = (field, value) => {
        setModulData(prev => ({
          ...prev,
          infoUmum: { ...prev.infoUmum, [field]: value }
        }));
      };

      const updateIdentifikasi = (field, value) => {
        setModulData(prev => ({
          ...prev,
          identifikasiMurid: { ...prev.identifikasiMurid, [field]: value }
        }));
      };

      const updateMateriPelajaran = (field, value) => {
        setModulData(prev => ({
          ...prev,
          materiPelajaran: { ...prev.materiPelajaran, [field]: value }
        }));
      };

      const handlePoinMateriChange = (index, value) => {
        const updatedPoin = [...(modulData.materiPelajaran?.poinMateri || [''])];
        updatedPoin[index] = value;
        updateMateriPelajaran('poinMateri', updatedPoin);
      };

      const addPoinMateri = () => {
        const updatedPoin = [...(modulData.materiPelajaran?.poinMateri || ['']), ''];
        updateMateriPelajaran('poinMateri', updatedPoin);
      };

      const removePoinMateri = (index) => {
        const currentPoin = modulData.materiPelajaran?.poinMateri || [''];
        if (currentPoin.length <= 1) return;
        const updatedPoin = currentPoin.filter((_, i) => i !== index);
        updateMateriPelajaran('poinMateri', updatedPoin);
      };

      // POPUP TAMBAH / EDIT BAB
      const handleAddOrEditBab = (existingBab = null) => {
        const isEdit = !!existingBab;
        Swal.fire({
          title: `<h2 class="text-xl font-bold text-slate-800">${isEdit ? 'Edit BAB' : 'Tambah BAB Baru'}</h2>`,
          html: `
            <div class="text-left mt-2 space-y-3">
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Judul / Nama BAB</label>
                <input type="text" id="swal-bab-title" class="w-full bg-transparent outline-none font-bold text-slate-700 text-sm" placeholder="Cth: BAB 1 - Aljabar dan Pengukuran" value="${isEdit ? existingBab.title : ''}">
              </div>
            </div>
          `,
          showCancelButton: true, confirmButtonText: isEdit ? 'Simpan Perubahan' : 'Tambah BAB', cancelButtonText: 'Batal', buttonsStyling: false,
          customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm', confirmButton: 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all mb-2 mt-4', cancelButton: 'w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all', actions: 'flex flex-col w-full p-0' },
          preConfirm: () => {
            const title = document.getElementById('swal-bab-title').value.trim();
            if (!title) {
              Swal.showValidationMessage('Nama BAB wajib diisi!');
              return false;
            }
            return { title };
          }
        }).then(async (result) => {
          if (result.isConfirmed) {
            try {
              if (isEdit) {
                const updated = { ...existingBab, title: result.value.title };
                await window.fs.setDoc(window.fs.doc(window.db, "modul_babs", existingBab.id.toString()), updated);
                setBabsDb(prev => prev.map(b => b.id === existingBab.id ? updated : b));
              } else {
                const newBab = {
                  id: Date.now(),
                  title: result.value.title,
                  rombelId: selectedRombel.id,
                  subjectId: selectedSubject.id,
                  academicYearId: activeAcademicPeriod.id,
                  createdAt: Date.now()
                };
                await window.fs.setDoc(window.fs.doc(window.db, "modul_babs", newBab.id.toString()), newBab);
                setBabsDb(prev => [...prev, newBab]);
              }
              Swal.fire({ icon: 'success', title: 'Berhasil', text: `BAB telah ${isEdit ? 'diperbarui' : 'ditambahkan'}.`, timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
            } catch(e) {
              console.error(e);
              Swal.fire('Gagal', 'Gagal menyimpan data BAB.', 'error');
            }
          }
        });
      };

      const handleDeleteBab = (babId, e) => {
        e.stopPropagation();
        Swal.fire({
          title: 'Hapus BAB ini?',
          text: 'Semua materi di dalam BAB ini juga akan terhapus!',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#ef4444',
          cancelButtonColor: '#94a3b8',
          confirmButtonText: 'Ya, Hapus!',
          cancelButtonText: 'Batal',
          customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
        }).then(async (res) => {
          if (res.isConfirmed) {
            try {
              await window.fs.deleteDoc(window.fs.doc(window.db, "modul_babs", babId.toString()));
              
              const relatedMateris = materisDb.filter(m => m.babId === babId);
              for (const m of relatedMateris) {
                await window.fs.deleteDoc(window.fs.doc(window.db, "modul_materis", m.id.toString()));
                await window.fs.deleteDoc(window.fs.doc(window.db, "modul_data", m.id.toString()));
              }

              setBabsDb(prev => prev.filter(b => b.id !== babId));
              setMaterisDb(prev => prev.filter(m => m.babId !== babId));
              if (selectedBab && selectedBab.id === babId) setSelectedBab(null);
              Swal.fire({ icon: 'success', title: 'Terhapus', text: 'BAB dan materi terkait berhasil dihapus.', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
            } catch (err) {
              console.error(err);
              Swal.fire('Gagal', 'Terjadi kesalahan saat menghapus.', 'error');
            }
          }
        });
      };

      // POPUP TAMBAH / EDIT MATERI
      const handleAddOrEditMateri = (existingMateri = null) => {
        const isEdit = !!existingMateri;
        Swal.fire({
          title: `<h2 class="text-xl font-bold text-slate-800">${isEdit ? 'Edit Materi' : 'Tambah Materi Baru'}</h2>`,
          html: `
            <div class="text-left mt-2 space-y-3">
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Nama Materi Utama</label>
                <input type="text" id="swal-materi-title" class="w-full bg-transparent outline-none font-bold text-slate-700 text-sm" placeholder="Cth: Persamaan Linier Satu Variabel" value="${isEdit ? existingMateri.title : ''}">
              </div>
            </div>
          `,
          showCancelButton: true, confirmButtonText: isEdit ? 'Simpan Perubahan' : 'Tambah Materi', cancelButtonText: 'Batal', buttonsStyling: false,
          customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm', confirmButton: 'w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-xl transition-all mb-2 mt-4', cancelButton: 'w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all', actions: 'flex flex-col w-full p-0' },
          preConfirm: () => {
            const title = document.getElementById('swal-materi-title').value.trim();
            if (!title) {
              Swal.showValidationMessage('Nama Materi wajib diisi!');
              return false;
            }
            return { title };
          }
        }).then(async (result) => {
          if (result.isConfirmed) {
            try {
              if (isEdit) {
                const updated = { ...existingMateri, title: result.value.title };
                await window.fs.setDoc(window.fs.doc(window.db, "modul_materis", existingMateri.id.toString()), updated);
                setMaterisDb(prev => prev.map(m => m.id === existingMateri.id ? updated : m));
              } else {
                const newMateri = {
                  id: Date.now(),
                  title: result.value.title,
                  babId: selectedBab.id,
                  createdAt: Date.now()
                };
                await window.fs.setDoc(window.fs.doc(window.db, "modul_materis", newMateri.id.toString()), newMateri);
                setMaterisDb(prev => [...prev, newMateri]);
              }
              Swal.fire({ icon: 'success', title: 'Berhasil', text: `Materi telah ${isEdit ? 'diperbarui' : 'ditambahkan'}.`, timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
            } catch(e) {
              console.error(e);
              Swal.fire('Gagal', 'Gagal menyimpan data materi.', 'error');
            }
          }
        });
      };

      const handleDeleteMateri = (materiId, e) => {
        e.stopPropagation();
        Swal.fire({
          title: 'Hapus Materi ini?',
          text: 'Data modul ajar pada materi ini juga akan terhapus!',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#ef4444',
          cancelButtonColor: '#94a3b8',
          confirmButtonText: 'Ya, Hapus!',
          cancelButtonText: 'Batal',

                      </h3>
                      <div className="flex items-center gap-3">
                        <span className={`text-[11px] font-bold flex items-center gap-1.5 px-3 py-1 rounded-full ${
                          saveStatus === 'Tersimpan' ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-amber-50 text-orange-600 border border-amber-100 animate-pulse'
                        }`}>
                          <i className={`fas ${saveStatus === 'Tersimpan' ? 'fa-check' : 'fa-spinner fa-spin'}`}></i>
                          {saveStatus}
                        </span>
                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50 px-3 py-1 rounded-full border border-slate-200 hidden sm:inline-block">
                          Bagian {activeTab + 1} dari 10
                        </span>
                      </div>
                    </div>

                    {/* TAB 1: INFORMASI UMUM */}
                    {activeTab === 0 && (
                      <div className="space-y-4 max-w-4xl mx-auto py-2 animate-fadeIn">
                        
                        {/* 1. Judul RPM */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 hover:bg-white hover:border-blue-300 transition-all">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500">
                            Judul Modul
                          </label>
                          <input 
                            type="text" 
                            value={modulData.infoUmum?.judul || ''} 
                            onChange={(e) => updateInfoUmum('judul', e.target.value)}
                            className="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 font-bold text-slate-800 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm"
                            placeholder="Judul Rencana Pembelajaran"
                          />
                        </div>

                        {/* 2. Nama Penyusun */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 opacity-90">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 flex items-center justify-between">
                            <span>Nama Penyusun</span>
                            <span className="text-[10px] text-slate-400 font-normal italic">(Otomatis Akun)</span>
                          </label>
                          <input 
                            type="text" 
                            readOnly
                            value={modulData.infoUmum?.namaPenyusun || ''} 
                            className="w-full bg-slate-100/80 border border-slate-200 rounded-xl px-4 py-2.5 font-bold text-slate-600 text-sm outline-none cursor-not-allowed"
                          />
                        </div>

                        {/* 3. Satuan Pendidikan */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 opacity-90">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 flex items-center justify-between">
                            <span>Satuan Pendidikan</span>
                            <span className="text-[10px] text-slate-400 font-normal italic">(Otomatis Sekolah)</span>
                          </label>
                          <input 
                            type="text" 
                            readOnly
                            value={modulData.infoUmum?.satuanPendidikan || ''} 
                            className="w-full bg-slate-100/80 border border-slate-200 rounded-xl px-4 py-2.5 font-bold text-slate-600 text-sm outline-none cursor-not-allowed"
                          />
                        </div>

                        {/* 4. Tahun Ajaran */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 opacity-90">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 flex items-center justify-between">
                            <span>Tahun Ajaran / Semester</span>
                            <span className="text-[10px] text-slate-400 font-normal italic">(Otomatis Tapel)</span>
                          </label>
                          <input 
                            type="text" 
                            readOnly
                            value={modulData.infoUmum?.tahunAjaran || ''} 
                            className="w-full bg-slate-100/80 border border-slate-200 rounded-xl px-4 py-2.5 font-bold text-slate-600 text-sm outline-none cursor-not-allowed"
                          />
                        </div>

                        {/* 5. Mata Pelajaran */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 opacity-90">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 flex items-center justify-between">
                            <span>Mata Pelajaran</span>
                            <span className="text-[10px] text-slate-400 font-normal italic">(Otomatis Mapel)</span>
                          </label>
                          <input 
                            type="text" 
                            readOnly
                            value={modulData.infoUmum?.mataPelajaran || ''} 
                            className="w-full bg-slate-100/80 border border-slate-200 rounded-xl px-4 py-2.5 font-bold text-slate-600 text-sm outline-none cursor-not-allowed"
                          />
                        </div>

                        {/* 6. Jenjang / Kelas / Fase */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-3 hover:bg-white hover:border-blue-300 transition-all">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500">
                            Jenjang / Kelas / Fase
                          </label>
                          <div className="grid grid-cols-1 sm:grid-cols-12 gap-3">
                            <div className="sm:col-span-8">
                              <label className="block text-[10px] font-semibold text-slate-400 mb-1">Jenjang & Kelas</label>
                              <input 
                                type="text" 
                                value={modulData.infoUmum?.jenjangKelas || ''} 
                                onChange={(e) => updateInfoUmum('jenjangKelas', e.target.value)}
                                className="w-full bg-white border border-slate-200 rounded-xl px-4 py-2 font-bold text-slate-800 text-sm focus:outline-none focus:border-blue-500 transition-all shadow-sm"
                              />
                            </div>
                            <div className="sm:col-span-4">
                              <label className="block text-[10px] font-semibold text-slate-400 mb-1">Fase Kurikulum</label>
                              <select 
                                value={modulData.infoUmum?.fase || 'Fase A'} 
                                onChange={(e) => updateInfoUmum('fase', e.target.value)}
                                className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 font-bold text-slate-800 text-sm focus:outline-none focus:border-blue-500 transition-all shadow-sm"
                              >
                                <option value="Fase A">Fase A (Kelas 1 - 2)</option>
                                <option value="Fase B">Fase B (Kelas 3 - 4)</option>
                                <option value="Fase C">Fase C (Kelas 5 - 6)</option>
                                <option value="Fase D">Fase D (Kelas 7 - 9)</option>
                                <option value="Fase E">Fase E (Kelas 10)</option>
                                <option value="Fase F">Fase F (Kelas 11 - 12)</option>
                              </select>
                            </div>
                          </div>
                        </div>

                        {/* 7. Bab / Topik (Materi) */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 opacity-90">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 flex items-center justify-between">
                            <span>BAB / Topik (Materi)</span>
                            <span className="text-[10px] text-slate-400 font-normal italic">(Otomatis Terisi)</span>
                          </label>
                          <input 
                            type="text" 
                            readOnly
                            value={modulData.infoUmum?.babTopik || ''} 
                            className="w-full bg-slate-100/80 border border-slate-200 rounded-xl px-4 py-2.5 font-bold text-slate-600 text-sm outline-none cursor-not-allowed"
                          />
                        </div>

                        {/* 8. Alokasi Waktu */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 hover:bg-white hover:border-blue-300 transition-all">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500">
                            Alokasi Waktu
                          </label>
                          <input 
                            type="text" 
                            value={modulData.infoUmum?.alokasiWaktu || ''} 
                            onChange={(e) => updateInfoUmum('alokasiWaktu', e.target.value)}
                            className="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 font-bold text-slate-800 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm"
                            placeholder="Cth: 2 JP (2 x 35 menit)"
                          />
                        </div>

                      </div>
                    )}

                    {/* TAB 2: IDENTIFIKASI MURID */}
                    {activeTab === 1 && (
                      <div className="space-y-4 max-w-4xl mx-auto py-2 animate-fadeIn">
                        
                        {/* 1. Pengetahuan Awal */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 hover:bg-white hover:border-blue-300 transition-all">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500">
                            Pengetahuan Awal Siswa
                          </label>
                          <textarea 
                            rows="3"
                            value={modulData.identifikasiMurid?.pengetahuanAwal || ''} 
                            onChange={(e) => updateIdentifikasi('pengetahuanAwal', e.target.value)}
                            className="w-full bg-white border border-slate-200 rounded-xl p-3 font-semibold text-slate-800 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm leading-relaxed"
                            placeholder="Deskripsikan pengetahuan atau pemahaman dasar yang sudah dimiliki murid sebelum mempelajari materi ini..."
                          />
                        </div>

                        {/* 2. Minat Siswa */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 hover:bg-white hover:border-blue-300 transition-all">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500">
                            Minat & Kecenderungan Belajar
                          </label>
                          <textarea 
                            rows="3"
                            value={modulData.identifikasiMurid?.minat || ''} 
                            onChange={(e) => updateIdentifikasi('minat', e.target.value)}
                            className="w-full bg-white border border-slate-200 rounded-xl p-3 font-semibold text-slate-800 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm leading-relaxed"
                            placeholder="Jelaskan hal-hal yang memotivasi siswa (misal: praktik langsung, bermain teka-teki, menggambar, diskusi kelompok)..."
                          />
                        </div>

                        {/* 3. Kebutuhan Belajar */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 hover:bg-white hover:border-blue-300 transition-all">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500">
                            Kebutuhan Belajar & Pendampingan
                          </label>
                          <textarea 
                            rows="3"
                            value={modulData.identifikasiMurid?.kebutuhanBelajar || ''} 
                            onChange={(e) => updateIdentifikasi('kebutuhanBelajar', e.target.value)}
                            className="w-full bg-white border border-slate-200 rounded-xl p-3 font-semibold text-slate-800 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm leading-relaxed"
                            placeholder="Sebutkan alat peraga konkret, panduan langkah demi langkah, atau tingkat bimbingan khusus yang diperlukan siswa..."
                          />
                        </div>

                      </div>
                    )}

                    {/* TAB 3: MATERI PELAJARAN */}
                    {activeTab === 2 && (
                      <div className="space-y-4 max-w-4xl mx-auto py-2 animate-fadeIn">
                        
                        {/* 1. Pengantar / Deskripsi Ringkas Materi */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-1.5 hover:bg-white hover:border-blue-300 transition-all">
                          <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500">
                            Deskripsi Ringkas / Pengantar Materi
                          </label>
                          <textarea 
                            rows="2"
                            value={modulData.materiPelajaran?.deskripsi || ''} 
                            onChange={(e) => updateMateriPelajaran('deskripsi', e.target.value)}
                            className="w-full bg-white border border-slate-200 rounded-xl p-3 font-semibold text-slate-800 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm leading-relaxed"
                            placeholder="Cth: Berikut materi pelajaran tentang konsep sisi pada bangun datar..."
                          />
                        </div>

                        {/* 2. Poin-poin Pokok Materi */}
                        <div className="bg-slate-50/70 p-4 rounded-2xl border border-slate-200/80 space-y-3 hover:bg-white hover:border-blue-300 transition-all">
                          <div className="flex items-center justify-between">
                            <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500">
                              Poin-Poin Rincian Materi Utama
                            </label>
                            <button 
                              type="button" 
                              onClick={addPoinMateri}
                              className="text-xs font-bold text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200 transition-colors flex items-center gap-1.5"
                            >
                              <i className="fas fa-plus text-[10px]"></i> Tambah Poin
                            </button>
                          </div>

                          <div className="space-y-2.5">
                            {(modulData.materiPelajaran?.poinMateri || ['']).map((poin, pIdx) => (
                              <div key={pIdx} className="flex items-center space-x-2">
                                <span className="w-7 h-7 rounded-lg bg-blue-100 text-blue-700 font-bold text-xs flex items-center justify-center shrink-0">
                                  {pIdx + 1}
                                </span>
                                <input 
                                  type="text"
                                  value={poin}
                                  onChange={(e) => handlePoinMateriChange(pIdx, e.target.value)}
                                  className="flex-1 bg-white border border-slate-200 rounded-xl px-4 py-2 font-semibold text-slate-800 text-sm focus:outline-none focus:border-blue-500 transition-all shadow-sm"
                                  placeholder={`Masukkan rincian poin materi ke-${pIdx + 1}...`}
                                />
                                {(modulData.materiPelajaran?.poinMateri || []).length > 1 && (
                                  <button 
                                    type="button"
                                    onClick={() => removePoinMateri(pIdx)}
                                    className="w-9 h-9 bg-red-50 hover:bg-red-500 text-red-500 hover:text-white rounded-xl flex items-center justify-center transition-colors shrink-0"
                                    title="Hapus Poin Ini"
                                  >
                                    <i className="fas fa-trash-can text-xs"></i>
                                  </button>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>

                      </div>
                    )}

                    {/* DYNAMIC TAB BODY UNTUK TAB 4 SAMPAI 10 (PLACEHOLDER DULU) */}
                    {activeTab > 2 && (
                      <div className="p-8 text-center border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50 my-6">
                        <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto text-2xl mb-4">
                          <i className={`fas ${TAB_LIST[activeTab].icon}`}></i>
                        </div>
                        <h4 className="text-base font-bold text-slate-700">Form {TAB_LIST[activeTab].title}</h4>
                        <p className="text-xs text-slate-400 mt-1 max-w-sm mx-auto font-medium">
                          Area input data untuk materi <b>{selectedMateri.title}</b> pada bagian <b>{TAB_LIST[activeTab].title}</b> akan dikembangkan pada tahap selanjutnya.
                        </p>
                      </div>
                    )}

                  </div>

                  {/* BOTTOM NAVIGATION BUTTONS */}
                  <div className="pt-6 border-t border-slate-100 flex items-center justify-between">
                    <button
                      onClick={() => setActiveTab(prev => Math.max(0, prev - 1))}
                      disabled={activeTab === 0}
                      className="bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 font-bold px-5 py-2.5 rounded-xl text-xs transition-all flex items-center gap-2"
                    >
                      <i className="fas fa-chevron-left text-[10px]"></i> Sebelum
                    </button>

                    <span className="text-xs font-semibold text-slate-400 hidden sm:inline-block">
                      {TAB_LIST[activeTab].title}
                    </span>

                    <button
                      onClick={() => setActiveTab(prev => Math.min(TAB_LIST.length - 1, prev + 1))}
                      disabled={activeTab === TAB_LIST.length - 1}
                      className="bg-blue-600 hover:bg-blue-700 disabled:opacity-40 text-white font-bold px-5 py-2.5 rounded-xl text-xs transition-all flex items-center gap-2 shadow-md shadow-blue-100"
                    >
                      Lanjut <i className="fas fa-chevron-right text-[10px]"></i>
                    </button>
                  </div>

                </div>

              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
