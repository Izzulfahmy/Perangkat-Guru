    const app = initializeApp(firebaseConfig);

    window.auth = getAuth(app);
    
    window.fs = { 
      collection, getDocs, setDoc, doc, deleteDoc, updateDoc,
      signInAnonymously, signOut 
    };

    window.calculateDistance = function(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const radLat1 = lat1 * Math.PI/180;
      const radLat2 = lat2 * Math.PI/180;
      const deltaLat = (lat2-lat1) * Math.PI/180;
      const deltaLon = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) + Math.cos(radLat1) * Math.cos(radLat2) * Math.sin(deltaLon/2) * Math.sin(deltaLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    };

    window.getLocalYYYYMMDD = function(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    window.formatTimeForInput = function(timeStr) {
      if (!timeStr || timeStr === '-') return '';
      return timeStr.replace(/\./g, ':').slice(0, 5);
    };

    window.dispatchEvent(new Event('firebase-ready'));

  <!-- ORCHESTRATOR ENGINE UTAMA -->
  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useMemo } = React;

    // Daftar module eksternal yang akan dimuat ke scope global secara dinamis
    const subModules = [
      'kalender-akademik', 'dashboard-guru', 'riwayat-guru', 
      'dashboard-admin', 'tahun-pelajaran', 'data-guru', 
      'data-murid', 'data-rombel', 'laporan-presensi', 'profil-sekolah'
    ];

    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [isModulesLoaded, setIsModulesLoaded] = useState(false);
      const [isDataReady, setIsDataReady] = useState(false);
      const [isLocating, setIsLocating] = useState(false); 
      const [isSavingSettings, setIsSavingSettings] = useState(false); 
      
      const [isSystemEmpty, setIsSystemEmpty] = useState(false); 
      const [regForm, setRegForm] = useState({ name: '', username: '' });

      const [user, setUser] = useState(() => {
        try {
          const savedUser = localStorage.getItem('presensi_user');
          return savedUser ? JSON.parse(savedUser) : null; 
        } catch(e) { return null; }
      }); 
      
      const [activeMenu, setActiveMenu] = useState(() => {
        try { return localStorage.getItem('presensi_menu') || 'dashboard'; } catch(e) { return 'dashboard'; }
      });
      
      const [filterMonth, setFilterMonth] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });

      const [usersDb, setUsersDb] = useState([]);
      const [studentsDb, setStudentsDb] = useState([]); 
      const [rombelsDb, setRombelsDb] = useState([]); 
      const [academicYearsDb, setAcademicYearsDb] = useState([]); 
      const [selectedRombel, setSelectedRombel] = useState(null);

      const [attendanceDb, setAttendanceDb] = useState([]);
      const [holidaysDb, setHolidaysDb] = useState([]); 
      const [verificationsDb, setVerificationsDb] = useState([]); 
      
      const [settingsDb, setSettingsDb] = useState({
        namaKegiatan: '', namaInstansi: 'Memuat...', lokasi: '', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', penanggungJawab: '[]',
        useLocation: 'true', useTime: 'true', alamat: '', desaKecamatan: '', kotaKabupaten: '', negara: 'Indonesia', kodePos: '', appScriptUrl: ''
      });
      const [currentTime, setCurrentTime] = useState(new Date());
      const [newUser, setNewUser] = useState({ name: '', username: '', nim: '' });
      
      const [newAcademicYear, setNewAcademicYear] = useState({
        startYear: new Date().getFullYear(), endYear: new Date().getFullYear() + 1, semester: 'Ganjil', curriculum: 'Kurikulum Merdeka', headmaster: ''
      });

      // 🛠️ DYNAMIC LOADER INTERCEPTOR SYSTEM
      useEffect(() => {
        const loadModulesSequentially = async () => {
          try {
            for (const mod of subModules) {
              const res = await fetch(`./js/${mod}.js?v=${Date.now()}`);
              if (!res.ok) throw new Error(`Gagal mendownload file js/${mod}.js`);
              let rawCode = await res.text();
              
              // Konversi paksa deklarasi 'const ViewName =' menjadi 'window.ViewName =' agar menembus batasan scope Babel
              const cleanCode = rawCode.replace(/const\s+([A-Za-z0-9_]+)\s*=\s*\(/g, 'window.$1 = (');
              
              // Transpile kode JSX via Babel Standalone di dalam scope global window
              const compiled = Babel.transform(cleanCode, { presets: ['react', 'env'] }).code;
              const scriptScript = document.createElement('script');
              scriptScript.text = compiled;
              document.body.appendChild(scriptScript);
            }
            setIsModulesLoaded(true);
          } catch (err) {
            console.error(err);
            Swal.fire("Gagal Memuat Komponen", "Terjadi kesalahan sinkronisasi arsitektur file. Silakan refresh halaman.", "error");
          }
        };
        loadModulesSequentially();
      }, []);

      const ensureAllClientsHaveRecord = async (targetDateStr, currentUserId) => {
        const clients = usersDb.filter(u => u.role === 'client');
        let createdPlaceholders = [];
        for (const client of clients) {
          if (client.id === currentUserId) continue;
          const exist = attendanceDb.find(a => a.userId === client.id && a.date === targetDateStr);
          if (!exist) {
            const pId = Date.now() + Math.floor(Math.random() * 1000) + client.id;
            const placeholder = { id: pId, userId: client.id, date: targetDateStr, timeIn: '-', timeOut: '-', status: 'Menunggu' };
            try {
              await window.fs.setDoc(window.fs.doc(window.db, "attendance", pId.toString()), placeholder);
              createdPlaceholders.push(placeholder);
            } catch(e) { console.error(e); }
          }
        }
        return createdPlaceholders;
      };

      const handleEditAttendance = (record) => {
        const u = usersDb.find(user => user.id === record.userId);
        Swal.fire({
          title: `<h2 class="text-xl font-bold text-slate-800">Edit Presensi</h2><p class="text-xs text-slate-400 font-medium">${u ? u.name : 'Guru'}</p>`,
          html: `
            <div class="text-left mt-2 space-y-3">
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Status Kehadiran</label>
                <select id="swal-att-status" class="w-full bg-transparent outline-none font-semibold text-slate-700 text-sm">
                  <option value="Hadir" ${record.status === 'Hadir' ? 'selected' : ''}>Hadir</option>
                  <option value="Terlambat" ${record.status === 'Terlambat' ? 'selected' : ''}>Terlambat</option>
                  <option value="Izin" ${record.status === 'Izin' ? 'selected' : ''}>Izin</option>
                  <option value="Sakit" ${record.status === 'Sakit' ? 'selected' : ''}>Sakit</option>
                  <option value="Alpa" ${record.status === 'Alpa' ? 'selected' : ''}>Alpa</option>
                </select>
              </div>
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Jam Masuk</label>
                <input type="time" id="swal-att-in" class="w-full bg-transparent outline-none font-semibold text-slate-700 text-sm" value="${window.formatTimeForInput(record.timeIn)}">
              </div>
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Jam Pulang</label>
                <input type="time" id="swal-att-out" class="w-full bg-transparent outline-none font-semibold text-slate-700 text-sm" value="${window.formatTimeForInput(record.timeOut)}">
              </div>
            </div>
          `,
          showCancelButton: true, confirmButtonText: 'Simpan Perubahan', cancelButtonText: 'Batal', buttonsStyling: false,
          customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm', confirmButton: 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all mb-2 mt-4', cancelButton: 'w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all', actions: 'flex flex-col w-full p-0' },
          preConfirm: () => {
            return {
              status: document.getElementById('swal-att-status').value,
              timeIn: document.getElementById('swal-att-in').value || '-',
              timeOut: document.getElementById('swal-att-out').value || '-'
            }
          }
        }).then(async (result) => {
          if (result.isConfirmed) {
            const updated = { ...record, ...result.value };
            await window.fs.setDoc(window.fs.doc(window.db, "attendance", record.id.toString()), updated);
            setAttendanceDb(prev => prev.map(a => a.id === record.id ? updated : a));
            Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Data presensi diperbarui.', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
          }
        });
      };

      const handleDeleteAttendance = (id) => {
        Swal.fire({
          title: 'Hapus Rekam Presensi?', text: "Data rekap ini akan hilang permanen!", icon: 'warning',
          showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#94a3b8', confirmButtonText: 'Ya, Hapus!', cancelButtonText: 'Batal', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
        }).then(async (result) => {
          if (result.isConfirmed) {
            await window.fs.deleteDoc(window.fs.doc(window.db, "attendance", id.toString()));
            setAttendanceDb(prev => prev.filter(a => a.id !== id));
            Swal.fire({ icon: 'success', title: 'Terhapus!', text: 'Rekam presensi telah dihapus.', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
          }
        });
      };

      const loadAllSystemData = async () => {
        const [usersSnap, attSnap, holSnap, verSnap, setSnap, studSnap, rombSnap, academicSnap] = await Promise.all([
          window.fs.getDocs(window.fs.collection(window.db, "users")),
          window.fs.getDocs(window.fs.collection(window.db, "attendance")),
          window.fs.getDocs(window.fs.collection(window.db, "holidays")),
          window.fs.getDocs(window.fs.collection(window.db, "verifications")),
          window.fs.getDocs(window.fs.collection(window.db, "settings")),
          window.fs.getDocs(window.fs.collection(window.db, "students")),
          window.fs.getDocs(window.fs.collection(window.db, "rombels")),
          window.fs.getDocs(window.fs.collection(window.db, "academic_years"))
        ]);

        let u = usersSnap.docs.map(d => d.data());
        let a = attSnap.docs.map(d => d.data());
        let h = holSnap.docs.map(d => d.data());
        let v = verSnap.docs.map(d => d.data());
        let st = studSnap.docs.map(d => d.data());
        let rb = rombSnap.docs.map(d => d.data());
        let ay = academicSnap.docs.map(d => d.data());
        
        let s = {};
        setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });

        if(Object.keys(s).length === 0) {
          s = { namaInstansi: 'Perangkat Guru Default', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', useLocation: 'false', useTime: 'true' };
          await window.fs.setDoc(window.fs.doc(window.db, "settings", "config"), s);
        }

        let pM = s.jamMasuk, pP = s.jamPulang;
        const fix = (t) => { if(!t) return null; const m = String(t).replace(/\./g, ':').match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2, '0')}:${m[2]}` : t; };
        
        const finalSettings = { 
          ...settingsDb, ...s, 
          jamMasuk: fix(pM) || '08:00', jamPulang: fix(pP) || '17:00',
          useLocation: s.hasOwnProperty('useLocation') ? String(s.useLocation).toLowerCase() : 'true',
          useTime: s.hasOwnProperty('useTime') ? String(s.useTime).toLowerCase() : 'true',
        };

        const now = new Date();
        const currentYYYYMMDD = window.getLocalYYYYMMDD(now);
        const currentHm = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
        
        let processedAtt = a.map(record => {
            if (record.status === 'Menunggu') {
              let shouldBeAlpa = false;
              if (record.date < currentYYYYMMDD) { shouldBeAlpa = true; } 
              else if (record.date === currentYYYYMMDD) {
                  const pH = parseInt((finalSettings.jamPulang || '17:00').split(':')[0]);
                  const pMin = parseInt((finalSettings.jamPulang || '17:00').split(':')[1]);
                  const cH = parseInt(currentHm.split(':')[0]);
                  const cMin = parseInt(currentHm.split(':')[1]);
                  if (cH > pH || (cH === pH && cMin >= pMin)) { shouldBeAlpa = true; }
              }
              if (shouldBeAlpa) {
                  window.fs.updateDoc(window.fs.doc(window.db, "attendance", record.id.toString()), { status: 'Alpa' }).catch(console.error);
                  return { ...record, status: 'Alpa' };
              }
            }
            return record;
        });

        const teachersList = u.filter(user => user.role === 'client');
        if (teachersList.length > 0 && !newAcademicYear.headmaster) {
          setNewAcademicYear(prev => ({ ...prev, headmaster: teachersList[0].name }));
        }

        setSettingsDb(finalSettings);
        setUsersDb(u);
        setStudentsDb(st);
        setRombelsDb(rb);
        setHolidaysDb(h);
        setVerificationsDb(v);
        setAttendanceDb(processedAtt);
        setAcademicYearsDb(ay);
        return u;
      };

      useEffect(() => {
        if (!isModulesLoaded) return; // Tunggu loader file selesai menyuntikkan komponen

        const initData = async () => {
          try {
            await window.fs.signInAnonymously(window.auth);
            const usersSnap = await window.fs.getDocs(window.fs.collection(window.db, "users"));
            
            if (usersSnap.empty) {
               setIsSystemEmpty(true);
               setSettingsDb(prev => ({ ...prev, namaInstansi: "Setup Sistem Baru" }));
            } else {
               setIsSystemEmpty(false);
               let savedUserStr = null;
               try { savedUserStr = localStorage.getItem('presensi_user'); } catch(e) {}

               if (savedUserStr) {
                  const parsed = JSON.parse(savedUserStr);
                  const uList = await loadAllSystemData();
                  const validUser = uList.find(user => user.username.toLowerCase() === parsed.username.toLowerCase());
                  
                  if(validUser){
                      setUser(validUser);
                      setIsDataReady(true);
                  } else {
                      try { localStorage.removeItem('presensi_user'); } catch(e) {}
                  }
               } else {
                  const setSnap = await window.fs.getDocs(window.fs.collection(window.db, "settings"));
                  let s = {};
                  setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });
                  setSettingsDb(prev => ({ ...prev, namaInstansi: s.namaInstansi || "Perangkat Guru" }));
               }
            }
            
            const splashDOM = document.getElementById('app-splash-screen');
            if (splashDOM) {
              splashDOM.classList.add('splash-fade-out');
              setTimeout(() => splashDOM.remove(), 600); 
            }
            setIsLoading(false);
          } catch (error) {
            console.error(error);
            Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Gagal sinkronisasi data cloud.', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
            setIsLoading(false);
          }
        };

        const checkFirebase = () => {
          if (window.db && window.fs && window.auth) initData();
          else window.addEventListener('firebase-ready', initData, {once: true});
        };
        checkFirebase();

        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, [isModulesLoaded]);

      const changeMenu = (menuName) => {
        setActiveMenu(menuName);
        try { localStorage.setItem('presensi_menu', menuName); } catch(e) {}
      };

      const handleLoginClick = async (username) => {
        if (!username) {
           Swal.fire({ icon: 'warning', title: 'Peringatan', text: 'Username tidak boleh kosong!', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
           return;
        }

        Swal.fire({
          html: '<div class="flex flex-col items-center py-2"><div class="w-10 h-10 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-4"></div><p class="text-slate-600 font-bold text-sm">Memverifikasi Akun</p></div>',
          allowOutsideClick: false, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
        });

        try {
          const uList = await loadAllSystemData();
          const found = uList.find(u => u.username.toLowerCase() === username.trim().toLowerCase());
          
          if (found) {
            setUser(found);
            setIsDataReady(true);
            try { localStorage.setItem('presensi_user', JSON.stringify(found)); } catch(e) {}
            Swal.fire({ icon: 'success', title: 'Berhasil!', text: `Selamat datang, ${found.name}`, timer: 1200, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } }).then(() => changeMenu('dashboard'));
          } else {
            Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: 'Username tidak terdaftar.', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
          }
        } catch(e) {
          console.error(e);
          Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Periksa internet Anda.', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
        }
      };

      const handleRegisterAdmin = async (e) => {
        e.preventDefault();
        if(!regForm.name || !regForm.username) return;

        Swal.fire({
          html: '<div class="flex flex-col items-center py-2"><div class="w-10 h-10 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-4"></div><p class="text-slate-600 font-bold text-sm">Membangun Akun Utama...</p></div>',
          allowOutsideClick: false, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
        });

        try {
          const mainAdmin = { id: Date.now(), name: regForm.name.trim(), username: regForm.username.trim().toLowerCase(), role: 'admin', nim: null };
          await window.fs.setDoc(window.fs.doc(window.db, "users", mainAdmin.id.toString()), mainAdmin);
          Swal.fire({ icon: 'success', title: 'Sistem Amankan!', text: 'Akun Admin Utama berhasil dibuat.', timer: 2000, showConfirmButton: false }).then(() => window.location.reload());
        } catch(err) {
          console.error(err);
          Swal.fire('Gagal Setup', 'Terjadi kesalahan: ' + err.message, 'error');
        }
      };

      const handleAddBulkAttendance = () => {
        const [yearStr, monthStr] = filterMonth.split('-');
        const y = parseInt(yearStr);
        const mIdx = parseInt(monthStr) - 1;
        const totalDays = new Date(y, mIdx + 1, 0).getDate();
        const existingDates = new Set(attendanceDb.filter(a => a.date.startsWith(filterMonth)).map(a => a.date));
        
        let availableDates = [];
        for (let d = 1; d <= totalDays; d++) {
          const dateObj = new Date(y, mIdx, d);
          const dateStr = window.getLocalYYYYMMDD(dateObj);
          if (!existingDates.has(dateStr)) {
            availableDates.push({ value: dateStr, label: dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) });
          }
        }

        if (availableDates.length === 0) {
          return Swal.fire({ icon: 'info', title: 'Pemberitahuan', text: 'Semua tanggal pada bulan ini sudah memiliki data presensi.', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
        }

        Swal.fire({
          title: '<h2 class="text-lg font-bold text-slate-800">Tambah Presensi Massal</h2>',
          html: `<div class="text-left mt-2"><div class="bg-slate-50 p-3 rounded-xl border border-slate-100"><label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Pilih Tanggal Kehadiran</label><select id="bulk-date-select" class="w-full bg-transparent outline-none font-bold text-slate-700 text-sm">${availableDates.map(d => `<option value="${d.value}">${d.label}</option>`).join('')}</select></div></div>`,
          showCancelButton: true, confirmButtonText: 'Simpan Kehadiran', cancelButtonText: 'Batal', buttonsStyling: false,
          customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-md', confirmButton: 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all mb-2 mt-4 text-sm', cancelButton: 'w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all text-sm', actions: 'flex flex-col w-full p-0' }
        }).then(async (result) => {
          if (result.isConfirmed) {
            const selectedDate = document.getElementById('bulk-date-select').value;
            const clients = usersDb.filter(u => u.role === 'client');
            if (clients.length === 0) return;

            try {
              let newRecords = [];
              for (const client of clients) {
                const recId = Date.now() + Math.floor(Math.random() * 100) + client.id;
                const newRecord = { id: recId, userId: client.id, date: selectedDate, timeIn: settingsDb.jamMasuk, timeOut: settingsDb.jamPulang, status: 'Hadir' };
                await window.fs.setDoc(window.fs.doc(window.db, "attendance", recId.toString()), newRecord);
                newRecords.push(newRecord);
              }
              setAttendanceDb(prev => [...prev, ...newRecords]);
            } catch (err) { console.error(err); }
          }
        });
      };

      const handleAddAcademicYear = async (e) => {
        e.preventDefault();
        const yearTitle = `${newAcademicYear.startYear}/${newAcademicYear.endYear}`;
        const addedId = Date.now();
        const addedData = { id: addedId, year: yearTitle, semester: newAcademicYear.semester, curriculum: newAcademicYear.curriculum, headmaster: newAcademicYear.headmaster || '-', isActive: false };
        try {
          await window.fs.setDoc(window.fs.doc(window.db, "academic_years", addedId.toString()), addedData);
          setAcademicYearsDb(prev => [...prev, addedData]);
        } catch(err) { console.error(err); }
      };

      const handleSetAcademicYearActive = async (id) => {
        try {
          const updatedList = await Promise.all(academicYearsDb.map(async (ay) => {
            const itemUpdate = { ...ay, isActive: ay.id === id };
            await window.fs.setDoc(window.fs.doc(window.db, "academic_years", ay.id.toString()), itemUpdate);
            return itemUpdate;
          }));
          setAcademicYearsDb(updatedList);
        } catch(e) { console.error(e); }
      };

      const handleDeleteAcademicYear = (id) => {
        Swal.fire({ title: 'Hapus?', text: "Data tapel akan hilang!", icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya' }).then(async (result) => {
          if (result.isConfirmed) {
            await window.fs.deleteDoc(window.fs.doc(window.db, "academic_years", id.toString()));
            setAcademicYearsDb(prev => prev.filter(ay => ay.id !== id));
          }
        });
      };

      const handleLogout = () => {
        setUser(null); setIsDataReady(false);
        try { localStorage.removeItem('presensi_user'); localStorage.removeItem('presensi_menu'); } catch(e) {}
      };

      const handleAddUser = async (e) => {
        e.preventDefault(); if(!newUser.name || !newUser.username) return;
        const added = { ...newUser, id: Date.now(), role: 'client' };
        await window.fs.setDoc(window.fs.doc(window.db, "users", added.id.toString()), added);
        setUsersDb(prev => [...prev, added]); setNewUser({ name: '', username: '', nim: '' });
      };

      const handleEditUser = (clientObj) => {
        Swal.fire({
          title: 'Update Data Guru',
          html: `<div class="text-left space-y-3"><input type="text" id="swal-n" class="w-full p-2 border rounded" value="${clientObj.name}"><input type="text" id="swal-u" class="w-full p-2 border rounded" value="${clientObj.username}"><input type="text" id="swal-nim" class="w-full p-2 border rounded" value="${clientObj.nim || ''}"></div>`,
          showCancelButton: true, preConfirm: () => ({ ...clientObj, name: document.getElementById('swal-n').value, username: document.getElementById('swal-u').value, nim: document.getElementById('swal-nim').value })
        }).then(async (result) => {
          if (result.isConfirmed) {
            await window.fs.setDoc(window.fs.doc(window.db, "users", result.value.id.toString()), result.value);
            setUsersDb(prev => prev.map(u => u.id === clientObj.id ? result.value : u));
          }
        });
      };

      const handleDeleteUser = (id) => {
        window.fs.deleteDoc(window.fs.doc(window.db, "users", id.toString())).then(() => setUsersDb(prev => prev.filter(u => u.id !== id)));
      };

      const handleAddStudentModal = () => {
        Swal.fire({
          title: 'Tambah Murid',
          html: '<div class="space-y-2"><input id="st-n" class="p-2 border rounded w-full" placeholder="Nama"><input type="date" id="st-b" class="p-2 border rounded w-full"><input id="st-c" class="p-2 border rounded w-full" placeholder="Kelas"></div>',
          showCancelButton: true, preConfirm: () => ({ name: document.getElementById('st-n').value, birthDate: document.getElementById('st-b').value, studentClass: document.getElementById('st-c').value || "-" })
        }).then(async (r) => {
          if(r.isConfirmed){
            const added = { id: Date.now(), ...r.value };
            await window.fs.setDoc(window.fs.doc(window.db, "students", added.id.toString()), added);
            setStudentsDb(prev => [...prev, added]);
          }
        });
      };

      const handleEditStudent = (s) => {
        Swal.fire({
          title: 'Edit Murid',
          html: `<div class="space-y-2"><input id="st-n" class="p-2 border rounded w-full" value="${s.name}"><input type="date" id="st-b" class="p-2 border rounded w-full" value="${s.birthDate}"><input id="st-c" class="p-2 border rounded w-full" value="${s.studentClass}"></div>`,
          showCancelButton: true, preConfirm: () => ({ ...s, name: document.getElementById('st-n').value, birthDate: document.getElementById('st-b').value, studentClass: document.getElementById('st-c').value })
        }).then(async (r) => {
          if(r.isConfirmed){
            await window.fs.setDoc(window.fs.doc(window.db, "students", s.id.toString()), r.value);
            setStudentsDb(prev => prev.map(item => item.id === s.id ? r.value : item));
          }
        });
      };

      const handleDeleteStudent = (id) => {
        window.fs.deleteDoc(window.fs.doc(window.db, "students", id.toString())).then(() => setStudentsDb(prev => prev.filter(s => s.id !== id)));
      };

      const handleAddStudentToRombel = async (studentId) => {
        if (!selectedRombel) return;
        const updatedIds = [...(selectedRombel.studentIds || []), studentId];
        const updatedRombel = { ...selectedRombel, studentIds: updatedIds };
        await window.fs.setDoc(window.fs.doc(window.db, "rombels", selectedRombel.id.toString()), updatedRombel);
        setRombelsDb(prev => prev.map(r => r.id === selectedRombel.id ? updatedRombel : r));
        setSelectedRombel(updatedRombel);
      };

      const handleRemoveStudentFromRombel = async (studentId) => {
        if (!selectedRombel) return;
        const updatedIds = (selectedRombel.studentIds || []).filter(id => id !== studentId);
        const updatedRombel = { ...selectedRombel, studentIds: updatedIds };
        await window.fs.setDoc(window.fs.doc(window.db, "rombels", selectedRombel.id.toString()), updatedRombel);
        setRombelsDb(prev => prev.map(r => r.id === selectedRombel.id ? updatedRombel : r));
        setSelectedRombel(updatedRombel);
      };

      const todayStr = window.getLocalYYYYMMDD(currentTime);
      const filteredAttendanceData = attendanceDb.filter(a => a.date.startsWith(filterMonth));
      const currentVerif = verificationsDb.find(v => v.month === filterMonth);
      const hasData = filteredAttendanceData.length > 0;

      const availableMonthsOptions = useMemo(() => {
        const monthsSet = new Set();
        attendanceDb.forEach(a => { if (a.date && a.date.length >= 7) monthsSet.add(a.date.substring(0, 7)); });
        monthsSet.add(todayStr.substring(0, 7));
        return Array.from(monthsSet).sort().reverse().map(ym => {
          const [year, month] = ym.split('-');
          const labelName = new Date(parseInt(year), parseInt(month) - 1, 1).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
          return { value: ym, label: labelName };
        });
      }, [attendanceDb, todayStr]);

      const todayAttendanceList = useMemo(() => {
        return usersDb.filter(u => u.role === 'client').map(client => {
          const record = attendanceDb.find(a => a.userId === client.id && a.date === todayStr);
          return { ...client, timeIn: record ? record.timeIn : '-', timeOut: record ? record.timeOut || '-' : '-', status: record ? record.status : 'Belum Absen' };
        });
      }, [usersDb, attendanceDb, todayStr]);

      const monthlyClientSummaries = useMemo(() => {
        const [yearStr, monthStr] = filterMonth.split('-');
        const year = parseInt(yearStr), monthIndex = parseInt(monthStr) - 1;
        const totalDaysInMonth = new Date(year, monthIndex + 1, 0).getDate();
        const activeDatesInMonth = new Set(attendanceDb.filter(a => a.date.startsWith(filterMonth)).map(a => a.date));

        return usersDb.filter(u => u.role === 'client').map(client => {
          let countHadir = 0, countIzin = 0, countSakit = 0, countAlpa = 0;
          const recordsThisMonth = attendanceDb.filter(a => a.userId === client.id && a.date.startsWith(filterMonth));
          for (let d = 1; d <= totalDaysInMonth; d++) {
            const loopDateObj = new Date(year, monthIndex, d);
            const dateStr = window.getLocalYYYYMMDD(loopDateObj);
            const matchRecord = recordsThisMonth.find(r => r.date === dateStr);
            if (matchRecord) {
              if (['Hadir', 'Terlambat'].includes(matchRecord.status)) countHadir++;
              else if (matchRecord.status === 'Izin') countIzin++;
              else if (matchRecord.status === 'Sakit') countSakit++;
              else if (matchRecord.status === 'Alpa') countAlpa++;
            } else if (activeDatesInMonth.has(dateStr) && loopDateObj <= new Date()) { countAlpa++; }
          }
          return { ...client, hadir: countHadir, izin: countIzin, sakit: countSakit, alpa: countAlpa };
        });
      }, [usersDb, attendanceDb, filterMonth]);

      const availableStudentsForRombel = useMemo(() => {
        const assigned = new Set();
        rombelsDb.forEach(rb => { if (rb.studentIds) rb.studentIds.forEach(id => assigned.add(id)); });
        return studentsDb.filter(s => !assigned.has(s.id));
      }, [studentsDb, rombelsDb]);

      const activeRombelStudents = useMemo(() => {
        if (!selectedRombel || !selectedRombel.studentIds) return [];
        return studentsDb.filter(s => selectedRombel.studentIds.includes(s.id));
      }, [studentsDb, selectedRombel]);

      if (!isModulesLoaded || isLoading) return null;

      if (isSystemEmpty) return (
        <div className="h-screen flex items-center justify-center p-4 bg-slate-100">
          <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border">
            <div className="text-center mb-6">
              <h1 className="text-xl font-bold text-slate-800">Pendaftaran Admin Utama</h1>
            </div>
            <form onSubmit={handleRegisterAdmin} className="space-y-4">
              <input type="text" required value={regForm.name} onChange={e=>setRegForm({...regForm, name:e.target.value})} className="w-full p-3 border rounded-xl" placeholder="Nama Admin" />
              <input type="text" required value={regForm.username} onChange={e=>setRegForm({...regForm, username:e.target.value})} className="w-full p-3 border rounded-xl" placeholder="Username" />
              <button type="submit" className="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl shadow">Daftar</button>
            </form>
          </div>
        </div>
      );

      if (!user) return (
        <div className="h-screen flex items-center justify-center p-4 bg-slate-100">
          <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border text-center">
            <h1 className="text-2xl font-bold text-slate-800 mb-6">{settingsDb.namaInstansi}</h1>
            <input type="text" id="logU" className="w-full p-4 bg-slate-50 border rounded-xl font-semibold mb-4" placeholder="Username..." onKeyDown={e => e.key === 'Enter' && handleLoginClick(e.target.value)} />
            <button onClick={() => handleLoginClick(document.getElementById('logU').value)} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">Masuk Sistem</button>
          </div>
        </div>
      );

      if (!isDataReady) return null; 

      return (
        <div className="flex flex-col lg:flex-row h-screen overflow-hidden">
          {/* SIDEBAR FOR DESKTOP */}
          <aside className="hidden lg:flex w-64 bg-slate-900 text-white flex-col shadow-xl z-20 shrink-0">
            <div className="p-6 border-b border-slate-800 flex items-center space-x-3">
              <h2 className="text-xl font-bold tracking-tight">Perangkat Guru</h2>
            </div>
            <nav className="flex-1 px-4 py-4 space-y-2 overflow-y-auto">
              <button onClick={() => changeMenu('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Dashboard</span></button>
              {user.role === 'client' && (
                <>
                  <button onClick={() => changeMenu('riwayat')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'riwayat' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Riwayat Presensi</span></button>
                  <button onClick={() => changeMenu('kalender')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'kalender' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Kalender</span></button>
                </>
              )}
              {user.role === 'admin' && <>
                <button onClick={() => changeMenu('tahun-pelajaran')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'tahun-pelajaran' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Tahun Pelajaran</span></button>
                <button onClick={() => changeMenu('data-guru')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'data-guru' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Data Guru</span></button>
                <button onClick={() => changeMenu('data-murid')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'data-murid' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Data Murid</span></button>
                <button onClick={() => changeMenu('rombel')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'rombel' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Data Rombel</span></button>
                <button onClick={() => changeMenu('laporan')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'laporan' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Laporan Presensi</span></button>
                <button onClick={() => changeMenu('profil')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'profil' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><span className="font-semibold text-sm">Profil Sekolah</span></button>
              </>}
            </nav>
            <div className="p-5 border-t border-slate-800"><button onClick={handleLogout} className="w-full bg-slate-800 hover:bg-red-500 text-slate-300 p-3 rounded-xl font-semibold transition-all">Keluar</button></div>
          </aside>

          {/* SCREEN DISPLAY MANAGEMENT */}
          <main className="flex-1 overflow-y-auto relative bg-slate-50">
            <div className="p-4 md:p-8 max-w-full mx-auto min-h-full">
              <header className="flex justify-between items-end mb-8">
                <div>
                  <h1 className="text-2xl font-black text-slate-900 capitalize">{activeMenu.replace('-', ' ')}</h1>
                  <p className="text-xs text-slate-500 font-bold uppercase mt-1">{settingsDb.namaInstansi}</p>
                </div>
                <div className="text-right bg-white p-3 rounded-xl shadow-sm border">
                  <div className="text-xl font-black text-blue-600 tabular-nums">{currentTime.toLocaleTimeString('id-ID')}</div>
                </div>
              </header>

              {/* ROUTER ORCHESTRATION VIEWPORTS */}
              {activeMenu === 'kalender' && window.CalendarComponent && (
                <window.CalendarComponent userRole={user.role} {...{settingsDb, setSettingsDb, holidaysDb, setHolidaysDb, isSavingSettings, setIsSavingSettings, attendanceDb, usersDb}} />
              )}
              {activeMenu === 'dashboard' && user.role === 'client' && window.DashboardGuruView && (
                <window.DashboardGuruView {...{user, settingsDb, currentTime, attendanceDb, setAttendanceDb, holidaysDb, usersDb, isLocating, setIsLocating, ensureAllClientsHaveRecord}} />
              )}
              {activeMenu === 'riwayat' && user.role === 'client' && window.RiwayatGuruView && (
                 <window.RiwayatGuruView {...{user, attendanceDb}} />
              )}
              {activeMenu === 'tahun-pelajaran' && user.role === 'admin' && window.TahunPelajaranView && (
                <window.TahunPelajaranView {...{academicYearsDb, setAcademicYearsDb, newAcademicYear, setNewAcademicYear, usersDb, handleAddAcademicYear, handleSetAcademicYearActive, handleDeleteAcademicYear}} />
              )}
              {activeMenu === 'dashboard' && user.role === 'admin' && window.DashboardAdminView && (
                <window.DashboardAdminView {...{usersDb, attendanceDb, studentsDb, holidaysDb, settingsDb, filterMonth, setFilterMonth, todayStr, currentTime, availableMonthsOptions, monthlyClientSummaries, handleLogout}} />
              )}
              {activeMenu === 'data-guru' && user.role === 'admin' && window.DataGuruView && (
                <window.DataGuruView {...{usersDb, newUser, setNewUser, handleAddUser, handleEditUser, handleDeleteUser}} />
              )}
              {activeMenu === 'data-murid' && user.role === 'admin' && window.DataMuridView && (
                <window.DataMuridView {...{studentsDb, handleAddStudentModal, handleEditStudent, handleDeleteStudent}} />
              )}
              {activeMenu === 'rombel' && user.role === 'admin' && window.DataRombelView && (
                <window.DataRombelView {...{rombelsDb, selectedRombel, setSelectedRombel, availableStudentsForRombel, activeRombelStudents, handleAddStudentToRombel, handleRemoveStudentFromRombel}} />
              )}
              {activeMenu === 'laporan' && user.role === 'admin' && window.LaporanPresensiView && (
                <window.LaporanPresensiView {...{filterMonth, setFilterMonth, filteredAttendanceData, usersDb, currentVerif, hasData, handleAddBulkAttendance, handleEditAttendance, handleDeleteAttendance, availableMonthsOptions}} />
              )}
              {activeMenu === 'profil' && user.role === 'admin' && window.ProfilSekolahView && (
                <window.ProfilSekolahView {...{settingsDb, setSettingsDb, isSavingSettings, setIsSavingSettings, usersDb}} />
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
