<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Perangkat Guru</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- JODIT EDITOR CSS & JS (GRATIS & SANGAT LENGKAP) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jodit/3.24.2/jodit.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jodit/3.24.2/jodit.min.js"></script>
</head>
<body class="bg-gray-50 h-screen hidden" id="main-content">

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">Aplikasi Perangkat Guru</h1>
        <div class="flex items-center gap-4">
            <span id="user-display" class="bg-indigo-700 px-3 py-1 rounded text-sm font-medium">Memuat profil...</span>
            <button id="btn-logout" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition">
                Keluar
            </button>
        </div>
    </nav>

    <!-- Isi Konten Utama Aplikasi -->
    <main class="p-8 max-w-5xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Editor Perangkat Pembelajaran</h2>
            <p class="text-gray-600 mb-6">Gunakan editor Jodit untuk menyusun dokumen administrasi guru secara lengkap.</p>
            
            <!-- Tempat Editor -->
            <textarea id="word-editor">Selamat datang! Tulis RPP atau modul ajar Anda di sini...</textarea>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrvRy59biZZilEgp8HIpHIUA16PcaflJU",
            authDomain: "perangkat-guru-85e8f.firebaseapp.com",
            projectId: "perangkat-guru-85e8f",
            storageBucket: "perangkat-guru-85e8f.firebasestorage.app",
            messagingSenderId: "489186826165",
            appId: "1:489186826165:web:c7b6d6a91ec70d12f06bfc",
            measurementId: "G-6K1DGGKEES"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const mainContent = document.getElementById('main-content');
        const userDisplay = document.getElementById('user-display');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        userDisplay.textContent = `${data.username || 'Admin'} (${data.role || 'user'})`;
                    } else {
                        userDisplay.textContent = user.email;
                    }
                } catch (err) {
                    userDisplay.textContent = "Terautentikasi";
                }
                
                mainContent.classList.remove('hidden');
                
                // Inisialisasi Jodit Editor
                initJoditEditor();
            } else {
                window.location.href = "login.html";
            }
        });

        function initJoditEditor() {
            new Jodit('#word-editor', {
                height: 500,
                language: 'id', // Mendukung penuh Bahasa Indonesia bawaan tanpa plugin tambahan
                toolbarButtonSize: 'middle',
                buttons: [
                    'source', '|',
                    'bold', 'strikethrough', 'underline', 'italic', '|',
                    'superscript', 'subscript', '|',
                    'ul', 'ol', '|',
                    'outdent', 'indent', '|',
                    'font', 'fontsize', 'brush', 'paragraph', '|',
                    'image', 'video', 'table', 'link', '|',
                    'align', 'undo', 'redo', '|',
                    'hr', 'eraser', 'copyformat', '|',
                    'symbol', 'fullSize', 'preview', 'print'
                ],
                // Mengaktifkan fitur upload gambar lokal otomatis dikonversi ke Base64
                uploader: {
                    insertImageAsBase64URI: true
                }
            });
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                alert("Gagal logout: " + error.message);
            });
        });
    </script>
</body>
</html>
