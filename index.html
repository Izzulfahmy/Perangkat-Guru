<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Perangkat Guru</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Mengunci font lembar kerja Kertas hanya Times New Roman */
        .editor-paper {
            width: 210mm;
            min-height: 297mm;
            padding: 2cm;
            margin: 0 auto;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            outline: none;
            
            /* Kunci Font & Standar Administrasi Guru */
            font-family: 'Times New Roman', Times, serif !important;
            font-size: 16px; 
            line-height: 1.5;
        }
        .editor-paper:focus {
            border-color: #6366f1;
        }
        
        /* Manipulasi CSS untuk Tipe Penomoran List (Ordered List) */
        .editor-paper ol {
            list-style-position: inside;
            margin-left: 10px;
        }
        .editor-paper ol[data-list-type="123"] { list-style-type: decimal !important; }
        .editor-paper ol[data-list-type="roman-upper"] { list-style-type: upper-roman !important; }
        .editor-paper ol[data-list-type="abc-lower"] { list-style-type: lower-alpha !important; }
        .editor-paper ol[data-list-type="abc-upper"] { list-style-type: upper-alpha !important; }

        /* Style Tabel */
        .editor-paper table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        .editor-paper table td, .editor-paper table th {
            border: 1px solid #cbd5e1;
            padding: 8px;
            min-width: 50px;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen hidden" id="main-content">

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">Aplikasi Perangkat Guru</h1>
        <div class="flex items-center gap-4">
            <span id="user-display" class="bg-indigo-700 px-3 py-1 rounded text-sm font-medium">Memuat profil...</span>
            <button id="btn-logout" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition">
                Keluar
            </button>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="p-8 max-w-6xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Editor Perangkat Pembelajaran (Times New Roman)</h2>
            <p class="text-gray-600 mb-6">Editor manual terstruktur dengan pembatasan font dan opsi penomoran khusus standar RPP.</p>
            
            <!-- Toolbar Buatan Sendiri -->
            <div class="bg-slate-50 p-2 border border-slate-200 rounded-t-xl flex flex-wrap gap-2 items-center text-sm">
                <!-- Riwayat -->
                <button onclick="execCmd('undo')" class="p-2 hover:bg-slate-200 rounded text-slate-700" title="Undo"><i class="fa-solid fa-rotate-left"></i></button>
                <button onclick="execCmd('redo')" class="p-2 hover:bg-slate-200 rounded text-slate-700" title="Redo"><i class="fa-solid fa-rotate-right"></i></button>
                <span class="text-slate-300">|</span>

                <!-- Format Teks -->
                <button onclick="execCmd('bold')" class="p-2 hover:bg-slate-200 rounded text-slate-700 font-bold" title="Tebal"><i class="fa-solid fa-bold"></i></button>
                <button onclick="execCmd('italic')" class="p-2 hover:bg-slate-200 rounded text-slate-700 italic" title="Miring"><i class="fa-solid fa-italic"></i></button>
                <button onclick="execCmd('underline')" class="p-2 hover:bg-slate-200 rounded text-slate-700 underline" title="Garis Bawah"><i class="fa-solid fa-underline"></i></button>
                <button onclick="execCmd('strikeThrough')" class="p-2 hover:bg-slate-200 rounded text-slate-700" title="Coret"><i class="fa-solid fa-strikethrough"></i></button>
                <span class="text-slate-300">|</span>

                <!-- Rataan Kertas -->
                <button onclick="execCmd('justifyLeft')" class="p-2 hover:bg-slate-200 rounded text-slate-700" title="Rata Kiri"><i class="fa-solid fa-align-left"></i></button>
                <button onclick="execCmd('justifyCenter')" class="p-2 hover:bg-slate-200 rounded text-slate-700" title="Rata Tengah"><i class="fa-solid fa-align-center"></i></button>
                <button onclick="execCmd('justifyRight')" class="p-2 hover:bg-slate-200 rounded text-slate-700" title="Rata Kanan"><i class="fa-solid fa-align-right"></i></button>
                <button onclick="execCmd('justifyFull')" class="p-2 hover:bg-slate-200 rounded text-slate-700" title="Rata Kiri Kanan"><i class="fa-solid fa-align-justify"></i></button>
                <span class="text-slate-300">|</span>

                <!-- Fitur Penomoran Spesifik Sesuai Request -->
                <button onclick="execListCmd('123')" class="px-2 py-1 bg-white border border-slate-200 hover:bg-slate-100 rounded text-slate-700 font-medium" title="Nomor 1, 2, 3">123</button>
                <button onclick="execListCmd('roman-upper')" class="px-2 py-1 bg-white border border-slate-200 hover:bg-slate-100 rounded text-slate-700 font-medium" title="Romawi I, II, III">I II III</button>
                <button onclick="execListCmd('abc-lower')" class="px-2 py-1 bg-white border border-slate-200 hover:bg-slate-100 rounded text-slate-700 font-medium" title="Abjad a, b, c">abc</button>
                <button onclick="execListCmd('abc-upper')" class="px-2 py-1 bg-white border border-slate-200 hover:bg-slate-100 rounded text-slate-700 font-medium" title="Kapital A, B, C">ABC</button>
                <span class="text-slate-300">|</span>

                <!-- Sisipkan Media Custom -->
                <button onclick="triggerImageUpload()" class="p-2 hover:bg-indigo-100 text-indigo-600 rounded font-medium" title="Sisipkan Gambar"><i class="fa-solid fa-image"></i> Gambar</button>
                <button onclick="insertTableManual()" class="p-2 hover:bg-emerald-100 text-emerald-600 rounded font-medium" title="Sisipkan Tabel"><i class="fa-solid fa-table"></i> Tabel</button>
                
                <input type="file" id="image-loader" accept="image/*" class="hidden" onchange="insertImageManual(this)">
            </div>

            <!-- Lembar Kerja Pengetikan -->
            <div class="bg-slate-200 p-4 border border-t-0 border-slate-200 rounded-b-xl max-h-[600px] overflow-y-auto">
                <div id="manual-editor" class="editor-paper" contenteditable="true">
                    <p>Mulai ketik dokumen administrasi guru dengan font Times New Roman di sini...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrvRy59biZZilEgp8HIpHIUA16PcaflJU",
            authDomain: "perangkat-guru-85e8f.firebaseapp.com",
            projectId: "perangkat-guru-85e8f",
            storageBucket: "perangkat-guru-85e8f.firebasestorage.app",
            messagingSenderId: "489186826165",
            appId: "1:489186826165:web:c7b6d6a91ec70d12f06bfc",
            measurementId: "G-6K1DGGKEES"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const mainContent = document.getElementById('main-content');
        const userDisplay = document.getElementById('user-display');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        userDisplay.textContent = `${data.username || 'Admin'} (${data.role || 'user'})`;
                    } else {
                        userDisplay.textContent = user.email;
                    }
                } catch (err) {
                    userDisplay.textContent = "Terautentikasi";
                }
                mainContent.classList.remove('hidden');
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                alert("Gagal logout: " + error.message);
            });
        });
    </script>

    <!-- LOGIK EDITOR MANUAL -->
    <script>
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('manual-editor').focus();
        }

        // Fungsi khusus untuk menyisipkan list sesuai tipe penomoran yang dipilih
        function execListCmd(type) {
            // Jalankan perintah list bawaan browser terlebih dahulu
            document.execCommand('insertOrderedList', false, null);
            
            // Cari elemen <ol> yang baru saja dibuat atau sedang aktif di dalam area kursor
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                let currentElement = selection.getRangeAt(0).startContainer;
                
                // Cari parent elemen sampai menemukan tag OL
                while (currentElement && currentElement.id !== 'manual-editor') {
                    if (currentElement.nodeName === 'OL') {
                        // Pasangkan attribute data custom agar di-render oleh CSS khusus kita
                        currentElement.setAttribute('data-list-type', type);
                        break;
                    }
                    currentElement = currentElement.parentNode;
                }
            }
            document.getElementById('manual-editor').focus();
        }

        function triggerImageUpload() {
            document.getElementById('image-loader').click();
        }

        function insertImageManual(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const imgHtml = `<img src="${e.target.result}" alt="Gambar Dokumen" style="max-width:100%; height:auto; margin:10px 0; border-radius:4px;"/>`;
                    document.execCommand('insertHTML', false, imgHtml);
                };
                reader.readAsDataURL(input.files[0]);
                input.value = '';
            }
        }

        function insertTableManual() {
            const rows = prompt("Masukkan jumlah baris (Rows):", "3");
            const cols = prompt("Masukkan jumlah kolom (Columns):", "3");
            
            if (rows > 0 && cols > 0) {
                let tableHtml = '<table><tbody>';
                for (let i = 0; i < rows; i++) {
                    tableHtml += '<tr>';
                    for (let j = 0; j < cols; j++) {
                        tableHtml += '<td>Ketik...</td>';
                    }
                    tableHtml += '</tr>';
                }
                tableHtml += '</tbody></table><p><br></p>';
                document.execCommand('insertHTML', false, tableHtml);
            }
        }
    </script>
</body>
</html>
