<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Perangkat Guru</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 h-screen hidden flex flex-col" id="main-content"> <!-- Disembunyikan dulu sampai terverifikasi login -->

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md shrink-0">
        <h1 class="text-xl font-bold">Aplikasi Perangkat Guru</h1>
        <div class="flex items-center gap-4">
            <span id="user-display" class="bg-indigo-700 px-3 py-1 rounded text-sm font-medium">Memuat profil...</span>
            <button id="btn-logout" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition">
                Keluar
            </button>
        </div>
    </nav>

    <!-- Isi Konten Utama Aplikasi -->
    <main class="p-6 flex-1 flex flex-col max-w-7xl w-full mx-auto">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex-1 flex flex-col">
            <div class="mb-4 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">Editor Perangkat Pembelajaran (Modular Component)</h2>
                    <p class="text-xs text-gray-500">Memanggil modul eksternal wordeditor.html via iframe secara dinamis.</p>
                </div>
                <!-- Tombol aksi pembuktian interaksi data antar file -->
                <button onclick="saveDocumentAction()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition">
                    Simpan Dokumen
                </button>
            </div>
            
            <!-- MEMANGGIL COMPONENT EDITOR VIA IFRAME -->
            <div class="flex-1 border border-slate-300 rounded-xl overflow-hidden bg-slate-400">
                <iframe id="editor-frame" src="wordeditor.html" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrvRy59biZZilEgp8HIpHIUA16PcaflJU",
            authDomain: "perangkat-guru-85e8f.firebaseapp.com",
            projectId: "perangkat-guru-85e8f",
            storageBucket: "perangkat-guru-85e8f.firebasestorage.app",
            messagingSenderId: "489186826165",
            appId: "1:489186826165:web:c7b6d6a91ec70d12f06bfc",
            measurementId: "G-6K1DGGKEES"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const mainContent = document.getElementById('main-content');
        const userDisplay = document.getElementById('user-display');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        userDisplay.textContent = `${data.username || 'Admin'} (${data.role || 'user'})`;
                    } else {
                        userDisplay.textContent = user.email;
                    }
                } catch (err) {
                    userDisplay.textContent = "Terautentikasi";
                }
                
                mainContent.classList.remove('hidden');
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                alert("Gagal logout: " + error.message);
            });
        });

        // Fungsi Aksi untuk Mengambil data teks HTML dari dalam Iframe WordEditor
        window.saveDocumentAction = function() {
            const iframe = document.getElementById('editor-frame');
            
            // Mengakses fungsi internal getContentHTML() milik wordeditor.html
            if (iframe && iframe.contentWindow && typeof iframe.contentWindow.getContentHTML === 'function') {
                const htmlHasilKetik = iframe.contentWindow.getContentHTML();
                
                console.log("Isi teks editor:", htmlHasilKetik);
                alert("Data teks berhasil ditarik dari Iframe! (Cek log console untuk melihat struktur HTML lengkap berkas Base64 gambar)");
                // Di sini Anda bisa melanjutkan proses penyimpanan string htmlHasilKetik ke Firestore Cloud
            } else {
                alert("Gagal memuat atau mengakses komponen editor.");
            }
        }
    </script>
</body>
</html>
