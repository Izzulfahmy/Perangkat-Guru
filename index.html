<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perangkat Guru</title>
  
  <link rel="icon" type="image/png" href="./asset/LOGO%20UNIVERSITAS%20JEMBER%20.png" />
  <link rel="shortcut icon" type="image/png" href="./asset/LOGO%20UNIVERSITAS%20JEMBER%20.png" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin="anonymous"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    aside::-webkit-scrollbar-thumb { background: #334155; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .swal2-minimalist-popup {
      border-radius: 32px !important;
      padding: 1.5rem !important;
      background: rgba(255, 255, 255, 0.98) !important;
      backdrop-filter: blur(10px) !important;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15) !important;
      border: 1px solid #f1f5f9 !important;
    }

    .splash-fade-out {
      opacity: 0 !important;
      transform: scale(1.08) !important;
      transition: opacity 0.6s ease-out, transform 0.6s ease-out !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased text-sm">

  <!-- SPLASH SCREEN LAYER -->
  <div id="app-splash-screen" class="fixed inset-0 bg-gradient-to-br from-blue-600 to-blue-700 z-[9999] flex flex-col items-center justify-center text-white p-4 transition-all duration-700">
    <div id="splash-content" class="flex flex-col items-center max-w-md text-center space-y-5">
      <img src="./asset/LOGO%20UNIVERSITAS%20JEMBER%20.png" alt="Logo UNEJ" class="w-24 h-auto drop-shadow-xl animate-pulse" onerror="this.style.display='none'">
      <div class="space-y-1">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight">Selamat Datang</h1>
        <p class="text-xs md:text-sm text-blue-100 font-medium opacity-90">Sistem Portal Integrasi Perangkat Guru</p>
      </div>
      <div class="pt-4">
        <div class="w-10 h-10 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
      </div>
    </div>
  </div>

  <!-- MOUNT ROOT POINT -->
  <div id="root" class="min-h-screen w-full"></div>

<!-- LOAD KODE ASIN KRONIS DARI SUB FILE MODUL .JS -->
  <script type="text/babel" data-type="module" src="./js/firebase-config.js"></script>
  <script type="text/babel" data-type="module" src="./js/helpers.js"></script>
  <script type="text/babel" data-type="module" src="./js/kalender-akademik.js"></script>
  <script type="text/babel" data-type="module" src="./js/dashboard-guru.js"></script>
  <script type="text/babel" data-type="module" src="./js/riwayat-guru.js"></script>
  <script type="text/babel" data-type="module" src="./js/dashboard-admin.js"></script>
  <script type="text/babel" data-type="module" src="./js/tahun-pelajaran.js"></script>
  <script type="text/babel" data-type="module" src="./js/data-guru.js"></script>
  <script type="text/babel" data-type="module" src="./js/data-murid.js"></script>
  <script type="text/babel" data-type="module" src="./js/data-rombel.js"></script>
  <script type="text/babel" data-type="module" src="./js/laporan-presensi.js"></script>
  <script type="text/babel" data-type="module" src="./js/profil-sekolah.js"></script>

  <!-- LOGIKA APP ORCHESTRATOR UTAMA -->
  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useMemo } = React;

    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [isDataReady, setIsDataReady] = useState(false);
      const [isLocating, setIsLocating] = useState(false); 
      const [isSavingSettings, setIsSavingSettings] = useState(false); 
      
      const [isSystemEmpty, setIsSystemEmpty] = useState(false); 
      const [regForm, setRegForm] = useState({ name: '', username: '' });

      const [user, setUser] = useState(() => {
        try {
          const savedUser = localStorage.getItem('presensi_user');
          return savedUser ? JSON.parse(savedUser) : null; 
        } catch(e) { 
          return null; 
        }
      }); 
      
      const [activeMenu, setActiveMenu] = useState(() => {
        try {
          return localStorage.getItem('presensi_menu') || 'dashboard';
        } catch(e) {
          return 'dashboard';
        }
      });
      
      const [filterMonth, setFilterMonth] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });

      const [usersDb, setUsersDb] = useState([]);
      const [studentsDb, setStudentsDb] = useState([]); 
      const [rombelsDb, setRombelsDb] = useState([]); 
      const [academicYearsDb, setAcademicYearsDb] = useState([]); 
      const [selectedRombel, setSelectedRombel] = useState(null);

      const [attendanceDb, setAttendanceDb] = useState([]);
      const [holidaysDb, setHolidaysDb] = useState([]); 
      const [verificationsDb, setVerificationsDb] = useState([]); 
      
      const [settingsDb, setSettingsDb] = useState({
        namaKegiatan: '',
        namaInstansi: 'Memuat...', lokasi: '', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', penanggungJawab: '[]',
        useLocation: 'true', useTime: 'true', alamat: '', desaKecamatan: '', kotaKabupaten: '', negara: 'Indonesia', kodePos: '', appScriptUrl: ''
      });
      const [currentTime, setCurrentTime] = useState(new Date());
      const [newUser, setNewUser] = useState({ name: '', username: '', nim: '' });
      
      const [newAcademicYear, setNewAcademicYear] = useState({
        startYear: new Date().getFullYear(),
        endYear: new Date().getFullYear() + 1,
        semester: 'Ganjil',
        curriculum: 'Kurikulum Merdeka',
        headmaster: ''
      });

      const ensureAllClientsHaveRecord = async (targetDateStr, currentUserId) => {
        const clients = usersDb.filter(u => u.role === 'client');
        let createdPlaceholders = [];
        for (const client of clients) {
          if (client.id === currentUserId) continue;
          const exist = attendanceDb.find(a => a.userId === client.id && a.date === targetDateStr);
          if (!exist) {
            const pId = Date.now() + Math.floor(Math.random() * 1000) + client.id;
            const placeholder = { id: pId, userId: client.id, date: targetDateStr, timeIn: '-', timeOut: '-', status: 'Menunggu' };
            try {
              await window.fs.setDoc(window.fs.doc(window.db, "attendance", pId.toString()), placeholder);
              createdPlaceholders.push(placeholder);
            } catch(e) { console.error(e); }
          }
        }
        return createdPlaceholders;
      };

      const handleGenerateVerif = async () => {
        Swal.fire({
          html: '<div class="flex flex-col items-center py-2"><div class="w-10 h-10 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-4"></div><p class="text-slate-600 font-bold text-sm">Membuat Tautan Verifikasi Resmi...</p></div>',
          allowOutsideClick: false, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-xs' }
        });

        try {
          const [yearStr, monthStr] = filterMonth.split('-');
          const vid = `${yearStr}${monthStr}-${Date.now().toString(16).substring(4).toUpperCase()}`;
          
          let baseUrl = settingsDb.appScriptUrl || (window.location.origin + window.location.pathname);
          if (baseUrl.endsWith('index.html')) {
            baseUrl = baseUrl.replace('index.html', '');
          }
          if (!baseUrl.endsWith('/')) baseUrl += '/';
          
          const verificationUrl = `${baseUrl}verification.html?vid=${vid}`;
          
          const newVerif = {
            id: Date.now(),
            month: filterMonth,
            vid: vid,
            url: verificationUrl
          };

          await window.fs.setDoc(window.fs.doc(window.db, "verifications", newVerif.id.toString()), newVerif);
          setVerificationsDb(prev => [...prev, newVerif]);
          
          Swal.fire({
            icon: 'success',
            title: 'Berhasil!',
            text: 'Tautan verifikasi bulan ini telah berhasil dibuat.',
            timer: 1500,
            showConfirmButton: false,
            customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
          });
        } catch (error) {
          console.error(error);
          Swal.fire('Error', 'Gagal membuat tautan verifikasi resmi.', 'error');
        }
      };

      const handleEditAttendance = (record) => {
        const u = usersDb.find(user => user.id === record.userId);
        Swal.fire({
          title: `<h2 class="text-xl font-bold text-slate-800">Edit Presensi</h2><p class="text-xs text-slate-400 font-medium">${u ? u.name : 'Guru'}</p>`,
          html: `
            <div class="text-left mt-2 space-y-3">
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Status Kehadiran</label>
                <select id="swal-att-status" class="w-full bg-transparent outline-none font-semibold text-slate-700 text-sm">
                  <option value="Hadir" ${record.status === 'Hadir' ? 'selected' : ''}>Hadir</option>
                  <option value="Terlambat" ${record.status === 'Terlambat' ? 'selected' : ''}>Terlambat</option>
                  <option value="Izin" ${record.status === 'Izin' ? 'selected' : ''}>Izin</option>
                  <option value="Sakit" ${record.status === 'Sakit' ? 'selected' : ''}>Sakit</option>
                  <option value="Alpa" ${record.status === 'Alpa' ? 'selected' : ''}>Alpa</option>
                </select>
              </div>
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Jam Masuk</label>
                <input type="time" id="swal-att-in" class="w-full bg-transparent outline-none font-semibold text-slate-700 text-sm" value="${formatTimeForInput(record.timeIn)}">
              </div>
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Jam Pulang</label>
                <input type="time" id="swal-att-out" class="w-full bg-transparent outline-none font-semibold text-slate-700 text-sm" value="${formatTimeForInput(record.timeOut)}">
              </div>
            </div>
          `,
          showCancelButton: true, confirmButtonText: 'Simpan Perubahan', cancelButtonText: 'Batal', buttonsStyling: false,
          customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm', confirmButton: 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all mb-2 mt-4', cancelButton: 'w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all', actions: 'flex flex-col w-full p-0' },
          preConfirm: () => {
            return {
              status: document.getElementById('swal-att-status').value,
              timeIn: document.getElementById('swal-att-in').value || '-',
              timeOut: document.getElementById('swal-att-out').value || '-'
            }
          }
        }).then(async (result) => {
          if (result.isConfirmed) {
            const updated = { ...record, ...result.value };
            await window.fs.setDoc(window.fs.doc(window.db, "attendance", record.id.toString()), updated);
            setAttendanceDb(prev => prev.map(a => a.id === record.id ? updated : a));
            Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Data presensi diperbarui.', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
          }
        });
      };

      const handleDeleteAttendance = (id) => {
        Swal.fire({
          title: 'Hapus Rekam Presensi?', text: "Data rekap ini akan hilang permanen!", icon: 'warning',
          showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#94a3b8', confirmButtonText: 'Ya, Hapus!', cancelButtonText: 'Batal', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
        }).then(async (result) => {
          if (result.isConfirmed) {
            await window.fs.deleteDoc(window.fs.doc(window.db, "attendance", id.toString()));
            setAttendanceDb(prev => prev.filter(a => a.id !== id));
            Swal.fire({ icon: 'success', title: 'Terhapus!', text: 'Rekam presensi telah dihapus.', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
          }
        });
      };

      const loadAllSystemData = async () => {
        const [usersSnap, attSnap, holSnap, verSnap, setSnap, studSnap, rombSnap, academicSnap] = await Promise.all([
          window.fs.getDocs(window.fs.collection(window.db, "users")),
          window.fs.getDocs(window.fs.collection(window.db, "attendance")),
          window.fs.getDocs(window.fs.collection(window.db, "holidays")),
          window.fs.getDocs(window.fs.collection(window.db, "verifications")),
          window.fs.getDocs(window.fs.collection(window.db, "settings")),
          window.fs.getDocs(window.fs.collection(window.db, "students")),
          window.fs.getDocs(window.fs.collection(window.db, "rombels")),
          window.fs.getDocs(window.fs.collection(window.db, "academic_years"))
        ]);

        let u = usersSnap.docs.map(d => d.data());
        let a = attSnap.docs.map(d => d.data());
        let h = holSnap.docs.map(d => d.data());
        let v = verSnap.docs.map(d => d.data());
        let st = studSnap.docs.map(d => d.data());
        let rb = rombSnap.docs.map(d => d.data());
        let ay = academicSnap.docs.map(d => d.data());
        
        let s = {};
        setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });

        if(Object.keys(s).length === 0) {
          s = { namaInstansi: 'Perangkat Guru Default', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', useLocation: 'false', useTime: 'true' };
          await window.fs.setDoc(window.fs.doc(window.db, "settings", "config"), s);
        }

        let pM = s.jamMasuk, pP = s.jamPulang;
        const fix = (t) => { if(!t) return null; const m = String(t).replace(/\./g, ':').match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2, '0')}:${m[2]}` : t; };
        
        const finalSettings = { 
          ...settingsDb, 
          ...s, 
          jamMasuk: fix(pM) || '08:00', 
          jamPulang: fix(pP) || '17:00',
          useLocation: s.hasOwnProperty('useLocation') ? String(s.useLocation).toLowerCase() : 'true',
          useTime: s.hasOwnProperty('useTime') ? String(s.useTime).toLowerCase() : 'true',
        };

        const now = new Date();
        const currentYYYYMMDD = getLocalYYYYMMDD(now);
        const currentHm = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
        
        let processedAtt = a.map(record => {
            if (record.status === 'Menunggu') {
              let shouldBeAlpa = false;
              if (record.date < currentYYYYMMDD) {
                  shouldBeAlpa = true;
              } else if (record.date === currentYYYYMMDD) {
                  const pH = parseInt((finalSettings.jamPulang || '17:00').split(':')[0]);
                  const pMin = parseInt((finalSettings.jamPulang || '17:00').split(':')[1]);
                  const cH = parseInt(currentHm.split(':')[0]);
                  const cMin = parseInt(currentHm.split(':')[1]);
                  
                  if (cH > pH || (cH === pH && cMin >= pMin)) {
                      shouldBeAlpa = true;
                  }
              }
              if (shouldBeAlpa) {
                  window.fs.updateDoc(window.fs.doc(window.db, "attendance", record.id.toString()), { status: 'Alpa' }).catch(console.error);
                  return { ...record, status: 'Alpa' };
              }
            }
            return record;
        });

        const teachersList = u.filter(user => user.role === 'client');
        if (teachersList.length > 0 && !newAcademicYear.headmaster) {
          setNewAcademicYear(prev => ({ ...prev, headmaster: teachersList[0].name }));
        }

        setSettingsDb(finalSettings);
        setUsersDb(u);
        setStudentsDb(st);
        setRombelsDb(rb);
        setHolidaysDb(h);
        setVerificationsDb(v);
        setAttendanceDb(processedAtt);
        setAcademicYearsDb(ay);
        return u;
      };

      useEffect(() => {
        const initData = async () => {
          try {
            await window.fs.signInAnonymously(window.auth);
            const usersSnap = await window.fs.getDocs(window.fs.collection(window.db, "users"));
            
            if (usersSnap.empty) {
               setIsSystemEmpty(true);
               setSettingsDb(prev => ({ ...prev, namaInstansi: "Setup Sistem Baru" }));
            } else {
               setIsSystemEmpty(false);
               let savedUserStr = null;
               try { savedUserStr = localStorage.getItem('presensi_user'); } catch(e) {}

               if (savedUserStr) {
                  const parsed = JSON.parse(savedUserStr);
                  const uList = await loadAllSystemData();
                  const validUser = uList.find(user => user.username.toLowerCase() === parsed.username.toLowerCase());
                  
                  if(validUser){
                      setUser(validUser);
                      setIsDataReady(true);
                  } else {
                      try { localStorage.removeItem('presensi_user'); } catch(e) {}
                  }
               } else {
                  const setSnap = await window.fs.getDocs(window.fs.collection(window.db, "settings"));
                  let s = {};
                  setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });
                  setSettingsDb(prev => ({ ...prev, namaInstansi: s.namaInstansi || "Perangkat Guru" }));
               }
            }
            
            const splashDOM = document.getElementById('app-splash-screen');
            if (splashDOM) {
              splashDOM.classList.add('splash-fade-out');
              setTimeout(() => splashDOM.remove(), 600); 
            }
            setIsLoading(false);
          } catch (error) {
            console.error(error);
            Swal.fire('Koneksi Gagal', 'Gagal memuat database Firestore.', 'error');
            setIsLoading(false);
          }
        };

        const checkFirebase = () => {
          if (window.db && window.fs) initData();
          else window.addEventListener('firebase-ready', initData, {once: true});
        };
        checkFirebase();

        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const changeMenu = (menuName) => {
        setActiveMenu(menuName);
        try { localStorage.setItem('presensi_menu', menuName); } catch(e) {}
      };

      const handleLoginClick = async (username) => {
        if (!username) {
           Swal.fire({ icon: 'warning', title: 'Peringatan', text: 'Username tidak boleh kosong!', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
           return;
        }

        Swal.fire({
          html: '<div class="flex flex-col items-center py-2"><div class="w-10 h-10 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-4"></div><p class="text-slate-600 font-bold text-sm">Memverifikasi Akun</p></div>',
          allowOutsideClick: false, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
        });

        try {
          const uList = await loadAllSystemData();
          const found = uList.find(u => u.username.toLowerCase() === username.trim().toLowerCase());
          
          if (found) {
            setUser(found);
            setIsDataReady(true);
            try { localStorage.setItem('presensi_user', JSON.stringify(found)); } catch(e) {}
            Swal.fire({ icon: 'success', title: 'Berhasil!', text: `Selamat datang, ${found.name}`, timer: 1200, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } }).then(() => changeMenu('dashboard'));
          } else {
            Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: 'Username tidak terdaftar.', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
          }
        } catch(e) {
          console.error(e);
          Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Periksa internet Anda.', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
        }
      };

      const handleRegisterAdmin = async (e) => {
        e.preventDefault();
        if(!regForm.name || !regForm.username) return;

        Swal.fire({
          html: '<div class="flex flex-col items-center py-2"><div class="w-10 h-10 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-4"></div><p class="text-slate-600 font-bold text-sm">Membangun Akun Utama...</p></div>',
          allowOutsideClick: false, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
        });

        try {
          const mainAdmin = {
            id: Date.now(),
            name: regForm.name.trim(),
            username: regForm.username.trim().toLowerCase(),
            role: 'admin',
            nim: null 
          };

          await window.fs.setDoc(window.fs.doc(window.db, "users", mainAdmin.id.toString()), mainAdmin);
          
          Swal.fire({
            icon: 'success',
            title: 'Sistem Amankan!',
            text: 'Akun Admin Utama berhasil dibuat. Memuat ulang sistem...',
            timer: 2000,
            showConfirmButton: false,
            customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }
          }).then(() => {
             window.location.reload();
          });
        } catch(err) {
          console.error(err);
          Swal.fire('Gagal Setup', 'Terjadi kesalahan: ' + err.message, 'error');
        }
      };

      const handleAddBulkAttendance = () => {
        const [yearStr, monthStr] = filterMonth.split('-');
        const y = parseInt(yearStr);
        const mIdx = parseInt(monthStr) - 1;
        const totalDays = new Date(y, mIdx + 1, 0).getDate();

        const existingDates = new Set(attendanceDb.filter(a => a.date.startsWith(filterMonth)).map(a => a.date));
        
        let availableDates = [];
        for (let d = 1; d <= totalDays; d++) {
          const dateObj = new Date(y, mIdx, d);
          const dateStr = getLocalYYYYMMDD(dateObj);
          if (!existingDates.has(dateStr)) {
            availableDates.push({
              value: dateStr,

        const activeDatesInMonth = new Set(attendanceDb.filter(a => a.date.startsWith(filterMonth)).map(a => a.date));

        return usersDb.filter(u => u.role === 'client').map(client => {

          const recordsThisMonth = attendanceDb.filter(a => a.userId === client.id && a.date.startsWith(filterMonth));

          for (let d = 1; d <= totalDaysInMonth; d++) {
            const loopDateObj = new Date(year, monthIndex, d);
            const dateStr = getLocalYYYYMMDD(loopDateObj);
            const dayOfWeek = loopDateObj.getDay();

            const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
            const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';
            const isRoutineHoliday = (dayOfWeek === 0 && isLiburMinggu) || (dayOfWeek === 6 && isLiburSabtu);
            const isSpecialHoliday = holidaysDb.some(h => h.date === dateStr);

            const matchRecord = recordsThisMonth.find(r => r.date === dateStr);

            if (matchRecord) {

              else if (matchRecord.status === 'Sakit') countSakit++;

            <form onSubmit={handleRegisterAdmin} className="space-y-4">
              <div>
                <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 ml-1">Nama Lengkap Admin</label>
                <input type="text" required value={regForm.name} onChange={e=>setRegForm({...regForm, name:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-emerald-500 focus:outline-none transition-all font-medium text-slate-700 text-sm" placeholder="Contoh: Fahmi Professional" />
              </div>
              <div>
                <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 ml-1">Username Login Admin</label>
                <input type="text" required value={regForm.username} onChange={e=>setRegForm({...regForm, username:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-emerald-500 focus:outline-none transition-all font-bold text-slate-700 text-sm" placeholder="Contoh: masteradmin" />
              </div>
              <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-200 transition-all text-sm mt-4">Daftar & Amankan Sistem</button>
            </form>
          </div>
        </div>
      );

      if (!user) return (
        <div className="h-screen flex items-center justify-center p-4 bg-slate-100 relative overflow-hidden">
          <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
          <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
          
          <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-sm border border-slate-100 relative z-10">
            <div className="text-center mb-8">
              <div className="bg-blue-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 rotate-3 shadow-blue-200 shadow-xl">
                <i className="fas fa-chalkboard-user text-white text-4xl -rotate-3"></i>
              </div>
              <h1 className="text-2xl font-bold text-slate-800 tracking-tight leading-tight">{settingsDb.namaInstansi || 'Memuat...'}</h1>
              <p className="text-slate-400 mt-1 font-semibold uppercase tracking-widest text-[10px]">Perangkat Guru</p>
            </div>
            <div className="space-y-5">
              <input type="text" id="logU" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 focus:outline-none transition-all font-semibold text-slate-700 placeholder-slate-400 text-sm" placeholder="Masukkan Username..." onKeyDown={e => e.key === 'Enter' && handleLoginClick(e.target.value)} />
              <button onClick={() => handleLoginClick(document.getElementById('logU').value)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200/50 transition-all transform active:scale-[0.98] text-sm">Masuk Sistem</button>
            </div>
          </div>
        </div>
      );

      if (!isDataReady) return null; 

      return (
        <div className="flex flex-col lg:flex-row h-screen overflow-hidden">
          
          {/* NAV BAR LAYOUT FOR MOBILE TERMINALS */}
          <nav className="lg:hidden w-full bg-slate-900 text-white p-3 shadow-xl z-30 shrink-0">
            <div className="flex items-center justify-between mb-3 px-2 border-b border-slate-800 pb-3">
               <div className="flex items-center space-x-2.5">
                 <div className="bg-blue-600 p-2 rounded-lg shadow-inner shadow-blue-400/20"><i className="fas fa-chalkboard-user text-xs text-white"></i></div>
                 <h2 className="text-sm font-black tracking-tight uppercase">Perangkat Guru</h2>
               </div>
               
               <div className="flex items-center space-x-3">
                 <div className="text-right hidden sm:block">
                   <p className="text-[10px] font-bold text-slate-200 leading-none">{user.name}</p>
                   <p className="text-[8px] font-medium text-slate-500 uppercase tracking-widest mt-0.5">{user.role}</p>
                 </div>
                 <button onClick={handleLogout} className="flex items-center gap-1.5 border border-slate-700 bg-slate-800 hover:border-red-500/50 hover:bg-red-500/10 text-red-400 px-3 py-1.5 rounded-lg transition-all active:scale-[0.98] shadow-sm shrink-0">
                   <i className="fas fa-power-off text-xs"></i>
                   <span className="text-[9px] font-bold uppercase tracking-wider">Keluar</span>
                 </button>
               </div>
            </div>
            <div className={`grid gap-1 ${user.role === 'admin' ? 'grid-cols-7' : 'grid-cols-3'}`}>
              <button onClick={() => changeMenu('dashboard')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='dashboard'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                <i className="fas fa-home text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Beranda</span>
              </button>
              {user.role === 'client' && (
                <>
                  <button onClick={() => changeMenu('riwayat')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='riwayat'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                    <i className="fas fa-history text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Riwayat</span>
                  </button>
                  <button onClick={() => changeMenu('kalender')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='kalender'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                    <i className="fas fa-calendar-alt text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Kalender</span>
                  </button>
                </>
              )}
              {user.role === 'admin' && (
                <>
                  <button onClick={() => changeMenu('tahun pelajaran')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='tahun pelajaran'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                    <i className="fas fa-graduation-cap text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Tapel</span>
                  </button>
                  <button onClick={() => changeMenu('data guru')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='data guru'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                    <i className="fas fa-chalkboard-teacher text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Guru</span>
                  </button>
                  <button onClick={() => changeMenu('data murid')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='data murid'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                    <i className="fas fa-user-graduate text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Murid</span>
                  </button>
                  <button onClick={() => changeMenu('rombel')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='rombel'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                    <i className="fas fa-cubes text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Rombel</span>
                  </button>
                  <button onClick={() => changeMenu('laporan')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='laporan'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                    <i className="fas fa-file-invoice text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Laporan</span>
                  </button>
                  <button onClick={() => changeMenu('profil')} className={`flex flex-col items-center p-2 rounded-xl transition-all ${activeMenu==='profil'?'bg-blue-600 text-white shadow-lg':'text-slate-400 bg-slate-800/40'}`}>
                    <i className="fas fa-building text-base mb-1"></i><span className="text-[9px] font-bold uppercase">Profil</span>
                  </button>
                </>
              )}
            </div>
          </nav>

          {/* ASIDE SIDEBAR ROUTER SYSTEM FOR DESKTOP */}
          <aside className="hidden lg:flex w-64 bg-slate-900 text-white flex-col shadow-xl z-20 transition-all shrink-0">
            <div className="p-6 border-b border-slate-800/80 flex items-center space-x-3">
              <div className="bg-blue-500 p-2 rounded-lg"><i className="fas fa-chalkboard-user text-white text-lg"></i></div>
              <h2 className="text-xl font-bold tracking-tight">Perangkat Guru</h2>
            </div>
            
            <nav className="flex-1 px-4 py-4 space-y-2 overflow-y-auto">
              <button onClick={() => changeMenu('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'dashboard' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-home w-5 text-center"></i><span className="font-semibold text-sm">Dashboard</span></button>
              
              {user.role === 'client' && (
                <>
                  <button onClick={() => changeMenu('riwayat')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'riwayat' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-history w-5 text-center"></i><span className="font-semibold text-sm">Riwayat Presensi</span></button>
                  <button onClick={() => changeMenu('kalender')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'kalender' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-calendar-alt w-5 text-center"></i><span className="font-semibold text-sm">Kalender</span></button>
                </>
              )}
              
              {user.role === 'admin' && <>
                <button onClick={() => changeMenu('tahun pelajaran')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'tahun pelajaran' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-graduation-cap w-5 text-center"></i><span className="font-semibold text-sm">Tahun Pelajaran</span></button>
                <button onClick={() => changeMenu('data guru')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'data guru' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-chalkboard-teacher w-5 text-center"></i><span className="font-semibold text-sm">Data Guru</span></button>
                <button onClick={() => changeMenu('data murid')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'data murid' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-user-graduate w-5 text-center"></i><span className="font-semibold text-sm">Data Murid</span></button>
                <button onClick={() => changeMenu('rombel')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'rombel' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-cubes w-5 text-center"></i><span className="font-semibold text-sm">Data Rombel</span></button>
                <button onClick={() => changeMenu('laporan')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'laporan' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-file-invoice w-5 text-center"></i><span className="font-semibold text-sm">Laporan Presensi</span></button>
                <button onClick={() => changeMenu('kalender')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'kalender' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-calendar-alt w-5 text-center"></i><span className="font-semibold text-sm">Kalender</span></button>
                <button onClick={() => changeMenu('profil')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeMenu === 'profil' ? 'bg-blue-600 shadow-md shadow-blue-900/50 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}><i className="fas fa-building w-5 text-center"></i><span className="font-semibold text-sm">Profil Sekolah</span></button>
              </>}
            </nav>
            
            <div className="p-5 border-t border-slate-800/80">
              <button onClick={handleLogout} className="w-full flex items-center justify-center space-x-2 bg-slate-800 hover:bg-red-500 hover:text-white text-slate-300 p-3 rounded-xl font-semibold text-sm transition-all"><i className="fas fa-power-off"></i><span>Keluar</span></button>
            </div>
          </aside>

          {/* MAIN INTERFACE VIEWPORTS MANAGER */}
          <main className="flex-1 overflow-y-auto relative bg-slate-50/80">
            <div className="p-4 md:p-8 max-w-full mx-auto min-h-full">
              
              <header className="flex flex-col md:flex-row md:justify-between items-start md:items-end mb-8 space-y-5 md:space-y-0">
                <div className="w-full md:w-auto flex flex-col">
                  <h1 className="text-2xl md:text-3xl font-black text-slate-900 tracking-tight capitalize leading-none">{activeMenu.replace('-', ' ')}</h1>
                  <div className="mt-4 bg-white border border-slate-200 rounded-xl py-2.5 px-3.5 shadow-sm inline-block w-full md:w-auto">
                    <div className="flex flex-col gap-y-0.5">
                      {settingsDb.namaKegiatan && settingsDb.namaKegiatan.trim() !== '' && (
                        <div className="flex items-center text-blue-600">
                          <div className="w-5 flex justify-center shrink-0 opacity-80 mr-2"><i className="fas fa-briefcase text-xs"></i></div>
                          <h2 className="text-[11px] md:text-xs font-bold uppercase tracking-widest leading-none pt-0.5">{settingsDb.namaKegiatan}</h2>
                        </div>
                      )}
                      {settingsDb.namaInstansi && settingsDb.namaInstansi.trim() !== '' && (
                        <div className="flex items-center text-slate-800">
                          <div className="w-5 flex justify-center shrink-0 opacity-80 mr-2"><i className="fas fa-map-marker-alt text-xs"></i></div>
                          <p className="text-[10px] md:text-[11px] font-semibold uppercase tracking-widest leading-none pt-0.5">{settingsDb.namaInstansi}</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
                <div className="w-full md:w-auto bg-white px-4 py-3 md:px-5 md:py-3.5 rounded-xl md:rounded-2xl shadow-sm border border-slate-200 flex flex-row md:flex-col items-center md:items-end justify-between md:justify-center">
                  <div className="text-xl sm:text-2xl md:text-3xl font-black text-blue-600 tabular-nums tracking-tight">{currentTime.toLocaleTimeString('id-ID')}</div>
                  <div className="text-[13px] sm:text-[10px] md:text-xs font-bold text-slate-800 uppercase tracking-wider md:mt-1 text-right">{currentTime.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
                </div>
              </header>

              {/* ROUTER ORCHESTRATOR RENDER LOGIC */}
              {activeMenu === 'kalender' && (
                <CalendarComponent userRole={user.role} {...{settingsDb, setSettingsDb, holidaysDb, setHolidaysDb, isSavingSettings, setIsSavingSettings, attendanceDb, usersDb}} />
              )}
              
              {activeMenu === 'dashboard' && user.role === 'client' && (
                <DashboardGuruView {...{user, settingsDb, currentTime, attendanceDb, setAttendanceDb, holidaysDb, usersDb, isLocating, setIsLocating, ensureAllClientsHaveRecord}} />
              )}

              {activeMenu === 'riwayat' && user.role === 'client' && (
                 <RiwayatGuruView {...{user, attendanceDb}} />
              )}

              {activeMenu === 'tahun pelajaran' && user.role === 'admin' && (
                <TahunPelajaranView {...{academicYearsDb, setAcademicYearsDb, newAcademicYear, setNewAcademicYear, usersDb, handleAddAcademicYear, handleSetAcademicYearActive, handleDeleteAcademicYear}} />
              )}

              {activeMenu === 'dashboard' && user.role === 'admin' && (
                <DashboardAdminView {...{usersDb, attendanceDb, studentsDb, holidaysDb, settingsDb, filterMonth, setFilterMonth, todayStr, currentTime, availableMonthsOptions, monthlyClientSummaries}} />
              )}

              {activeMenu === 'data guru' && user.role === 'admin' && (
                <DataGuruView {...{usersDb, newUser, setNewUser, handleAddUser, handleEditUser, handleDeleteUser}} />
              )}

              {activeMenu === 'data murid' && user.role === 'admin' && (
                <DataMuridView {...{studentsDb, downloadExcelTemplate, uploadExcelData, handleAddStudentModal, handleEditStudent, handleDeleteStudent}} />
              )}

              {activeMenu === 'rombel' && user.role === 'admin' && (
                <DataRombelView {...{rombelsDb, selectedRombel, setSelectedRombel, handleAddRombelModal, handleDeleteRombel, availableStudentsForRombel, activeRombelStudents, handleAddStudentToRombel, handleRemoveStudentFromRombel}} />
              )}

              {activeMenu === 'laporan' && user.role === 'admin' && (
                <LaporanPresensiView {...{filterMonth, setFilterMonth, filteredAttendanceData, usersDb, currentVerif, hasData, handleAddBulkAttendance, handleGenerateVerif, handleDownloadPDF, handleEditAttendance, handleDeleteAttendance, availableMonthsOptions}} />
              )}

              {activeMenu === 'profil' && user.role === 'admin' && (
                <ProfilSekolahView {...{settingsDb, setSettingsDb, isSavingSettings, setIsSavingSettings, usersDb}} />
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
