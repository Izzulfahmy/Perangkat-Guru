<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Perangkat Guru</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- CKEDITOR 5 DOCUMENT BUILD CDN (STABIL & 100% BERFUNGSI) -->
    <script src="https://cdn.jsdelivr.net/npm/@ckeditor/ckeditor5-build-decoupled-document@41.1.0/build/ckeditor.js"></script>
    
    <style>
        /* Membuat tampilan kertas editor mirip Microsoft Word / Google Docs */
        .editor-container {
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #f8fafc;
        }
        .ck-toolbar {
            border-bottom: 1px solid #e2e8f0 !important;
            border-top: none !important;
            border-left: none !important;
            border-right: none !important;
            background: #ffffff !important;
        }
        .editor-scroller {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }
        .ck-editor__editable {
            width: 210mm; /* Lebar kertas A4 standar */
            min-height: 297mm;
            padding: 2cm !important;
            margin: 0 auto !important;
            background: white !important;
            border: 1px solid #e2e8f0 !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen hidden" id="main-content">

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">Aplikasi Perangkat Guru</h1>
        <div class="flex items-center gap-4">
            <span id="user-display" class="bg-indigo-700 px-3 py-1 rounded text-sm font-medium">Memuat profil...</span>
            <button id="btn-logout" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition">
                Keluar
            </button>
        </div>
    </nav>

    <!-- Isi Konten Utama Aplikasi -->
    <main class="p-8 max-w-6xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Editor Perangkat Pembelajaran</h2>
            <p class="text-gray-600 mb-6">Gunakan editor berstandar dokumen di bawah ini untuk menyusun administrasi guru dengan stabil.</p>
            
            <!-- Struktur Kontainer CKEditor 5 Document -->
            <div class="editor-container shadow-sm">
                <!-- Wadah Tempat Toolbar Berada -->
                <div id="toolbar-container"></div>
                
                <!-- Wadah Tempat Kertas Halaman Pengetikan -->
                <div class="editor-scroller">
                    <div id="word-editor">
                        <p>Selamat datang! Mulai susun RPP atau modul ajar resmi Anda di sini...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrvRy59biZZilEgp8HIpHIUA16PcaflJU",
            authDomain: "perangkat-guru-85e8f.firebaseapp.com",
            projectId: "perangkat-guru-85e8f",
            storageBucket: "perangkat-guru-85e8f.firebasestorage.app",
            messagingSenderId: "489186826165",
            appId: "1:489186826165:web:c7b6d6a91ec70d12f06bfc",
            measurementId: "G-6K1DGGKEES"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const mainContent = document.getElementById('main-content');
        const userDisplay = document.getElementById('user-display');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        userDisplay.textContent = `${data.username || 'Admin'} (${data.role || 'user'})`;
                    } else {
                        userDisplay.textContent = user.email;
                    }
                } catch (err) {
                    userDisplay.textContent = "Terautentikasi";
                }
                
                mainContent.classList.remove('hidden');
                
                // Panggil inisialisasi CKEditor setelah elemen dipastikan render di DOM
                initCKEditor();
            } else {
                window.location.href = "login.html";
            }
        });

        function initCKEditor() {
            DecoupledEditor
                .create(document.querySelector('#word-editor'), {
                    // Fitur adapter bawaan gratis agar upload gambar langsung dikonversi otomatis ke Base64
                    ckfinder: {
                        options: {
                            resourceType: 'Images'
                        }
                    }
                })
                .then(editor => {
                    const toolbarContainer = document.querySelector('#toolbar-container');
                    // Menyisipkan toolbar bawaan ke dalam wadah atas
                    toolbarContainer.appendChild(editor.ui.view.toolbar.element);
                    
                    // Otomatis mengaktifkan fitur konversi base64 untuk drop/paste gambar
                    editor.plugins.get('FileRepository').createUploadAdapter = (loader) => {
                        return {
                            upload: () => loader.file.then(file => new Promise((resolve, reject) => {
                                const reader = new FileReader();
                                reader.onload = () => resolve({ default: reader.result });
                                reader.onerror = error => reject(error);
                                reader.readAsDataURL(file);
                            }))
                        };
                    };
                })
                .catch(error => {
                    console.error("Gagal memuat CKEditor 5:", error);
                });
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                alert("Gagal logout: " + error.message);
            });
        });
    </script>
</body>
</html>
